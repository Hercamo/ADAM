# ══════════════════════════════════════════════════════════════════════════════
# ADAM AGT Light — Master Integration Configuration
# ══════════════════════════════════════════════════════════════════════════════
# This file defines the integration posture between ADAM and AGT.
# It is the single source of truth for:
#   - Which RGI domains are satisfied by which AGT packages
#   - Two-dimensional trust model configuration
#   - Naming disambiguation enforcement (code-level)
#   - Alternative runtime documentation (if not using AGT)
#
# Version 1.1 | April 2026 — aligned with ADAM book v1.4 (BOSS v3.2 canonical
# 7 dimensions, weight-sum 24.0; 5-Director Constitution — CEO, CFO, Legal
# Director, Market Director, CISO; 81+ Agent Mesh reference count 81 across
# seven canonical classes)
# ══════════════════════════════════════════════════════════════════════════════

adam_agt_integration:
  version: "1.1"
  adam_book_version: "1.4"
  boss_formula_version: "3.2"
  approach: "strategic_integration_option_b"    # Not Option A (loose reference) or C (deep coupling)
  agt_version: "1.1.0"
  agt_license: "MIT"
  deployment_model: "externalized_plugin"        # AGT content lives in plugin, not in main book

  modularity_declaration: |
    AGT satisfies ADAM's Runtime Governance Interface (RGI). Any compliant
    runtime implementation may substitute AGT without changing ADAM's doctrine,
    BOSS Score formula, governance model, or 81+ Agent Mesh topology.
    This is ADAM's modularity principle. It is not a disclaimer — it is
    an architectural guarantee.

# ── ADAM SOVEREIGN BOUNDARY ───────────────────────────────────────────────────
# These components are NEVER delegated to AGT or any runtime implementation.
adam_sovereign_components:
  - component: "CORE Engine"
    description: "Doctrine graph — culture, objectives, rules, expectations"
    agt_relationship: "AGT Agent OS reads CORE Engine policy exports. Cannot write to CORE Engine."

  - component: "BOSS Score v3.2"
    description: "Canonical 7-dimension risk scoring (0-100) with SOAP → MODERATE → ELEVATED → HIGH → OHSHAT escalation; weight-sum 24.0; Critical Dimension Override; non-idempotent penalty = +15 additive."
    agt_relationship: "AGT Agent Compliance feeds Regulatory Impact dimension inputs. BOSS Score formula is ADAM-sovereign."

  - component: "Exception Economy"
    description: "Autonomy budgets, non-idempotent penalties (+15 additive), tolerance windows"
    agt_relationship: "AGT Agent OS enforces BOSS tier gates. Exception Economy logic is ADAM-sovereign."

  - component: "5-Director Constitution"
    description: "CEO, CFO, Legal Director, Market Director, CISO (plus optional CPO, CTO add-ons)"
    agt_relationship: "None. AGT has no governance hierarchy. AGT compliance output is reviewed by Directors — not directed by AGT."

  - component: "81+ Agent Mesh Topology"
    description: "Reference count 81 across seven canonical classes (5 Domain Governors, 4 Orchestration, 3 Human Interface, 39 Corporate Work Groups, 23 AI-Centric Division, 4 Digital Twin, 3 Meta-Governance); named agents, authority flows, domain boundaries"
    agt_relationship: "AGT Agent Mesh provides identity and communication. ADAM defines the topology."

  - component: "Flight Recorder"
    description: "Hash-chained, WORM, 7-year, cryptographically signed evidence"
    agt_relationship: "AGT telemetry is bridged to Flight Recorder via RGI-04 adapter (ADAM-proprietary). AGT does not write to Flight Recorder directly."

  - component: "Cryptographic Authorization Vault"
    description: "Privacy-preserving delegation authority with smart-contract grants"
    agt_relationship: "AGT Agent Marketplace signs plugin manifests. Vault governs high-risk delegation — distinct capability."

  - component: "Sovereignty Architecture"
    description: "Jurisdictional control, SEAL alignment, multi-cloud sovereignty"
    agt_relationship: "AGT packages deployed within ADAM's sovereignty boundary. No AGT telemetry exits to Microsoft."

# ── RGI COMPLIANCE MAPPING ────────────────────────────────────────────────────
rgi_compliance:
  RGI-01:
    domain: "Policy Enforcement"
    agt_package: "agent-os"
    status: "fully_satisfied"
    latency_p99_ms: 0.1
    policy_formats: ["rego", "yaml", "cedar"]

  RGI-02:
    domain: "Agent Identity"
    agt_package: "agent-mesh"
    status: "fully_satisfied"
    identity_scheme: "did_w3c"
    cryptographic_algorithm: "Ed25519"
    trust_scoring_supported: true
    trust_score_scale: { min: 0, max: 1000, adam_autonomous_threshold: 700 }

  RGI-03:
    domain: "Execution Containment"
    agt_package: "agent-runtime"
    status: "fully_satisfied"
    privilege_model: "execution_rings_4"
    emergency_shutdown_supported: true
    saga_compensation_supported: true

  RGI-04:
    domain: "Telemetry Emission"
    agt_packages: ["agent-sre", "agent-os"]
    status: "fully_satisfied"
    otel_compatible: true
    flight_recorder_adapter: "adam-rgi-adapter"  # ADAM-proprietary bridge required
    boss_score_inputs_available: true

  RGI-05:
    domain: "Tool and Plugin Governance"
    agt_package: "agent-marketplace"
    status: "fully_satisfied"
    signing_algorithm: "Ed25519"
    revocation_registry_supported: true
    mcp_v2_compatible: true

# ── TERMINOLOGY DISAMBIGUATION ────────────────────────────────────────────────
# Enforced naming conventions to prevent confusion between AGT and ADAM terms.
# These rules are applied in all documentation, code comments, and communications.
terminology_rules:
  - agt_term: "Agent Mesh"
    agt_meaning: "AGT communication protocol with DID identity and IATP trust scoring"
    adam_term: "81+ Agent Mesh or ADAM Agent Mesh"
    adam_meaning: "Enterprise topology with reference count 81 across seven canonical classes (5 Domain Governors, 4 Orchestration, 3 Human Interface, 39 Corporate Work Groups, 23 AI-Centric Division, 4 Digital Twin, 3 Meta-Governance)"
    rule: "Never use bare 'agent mesh' without qualifier. Always specify 'AGT Agent Mesh' or 'ADAM agent mesh'."

  - agt_term: "Policy Engine"
    agt_meaning: "Agent OS: stateless interceptor at <0.1ms"
    adam_term: "CORE Engine or Policy & Risk Plane"
    adam_meaning: "Executable doctrine graph encoding organizational values"
    rule: "CORE Engine is ADAM's policy engine. Agent OS is AGT's enforcement tool. Different things."

  - agt_term: "Trust Score"
    agt_meaning: "0-1000 per-agent behavioral rating by Agent Mesh IATP"
    adam_term: "BOSS Score"
    adam_meaning: "0-100 per-action consequence rating across 7 dimensions"
    rule: "AGT scores agents. BOSS scores actions. Always qualify which score is referenced."

  - agt_term: "Kill Switch"
    agt_meaning: "Emergency Agent Runtime termination"
    adam_term: "OHSHAT tier"
    adam_meaning: "Constitutional full-stop event: all Directors + CEO notified, safe mode, evidence"
    rule: "OHSHAT is not just a kill switch — it is a governance event. Use 'OHSHAT protocol' not 'kill switch' for ADAM escalations."

  - agt_term: "Governor"
    agt_meaning: "(no AGT equivalent)"
    adam_term: "Domain Governor Agent"
    adam_meaning: "5 canonical Governor Agents with domain enforcement authority (Ring 1): Financial Governor, Legal & Compliance Governor, Security & Trust Governor, Market & Ecosystem Governor, Operations & Delivery Governor"
    rule: "AGT has no equivalent to ADAM's Governor Agents. Never describe AGT components as 'governors'."

# ── BOSS DIMENSION → AGT INPUT MAPPING ───────────────────────────────────────
boss_dimension_agt_inputs:
  sovereignty_action:
    weight: 4.0
    priority_tier: "very_high"
    agt_inputs: ["agent-runtime ring violation events", "agent-mesh trust score drops"]
    adam_primary: "CORE Engine sovereignty rules + Agent authority scope"

  security_impact:
    weight: 5.0
    priority_tier: "top"
    agt_inputs: ["agent-os policy evaluations (AA01-AA10 coverage)", "agent-mesh identity events", "agent-runtime ring enforcement"]
    adam_primary: "Security & Trust Plane threat model"

  financial_exposure:
    weight: 4.0
    priority_tier: "very_high"
    agt_inputs: []  # No direct AGT input
    adam_primary: "Financial Governor Agent + CORE Engine financial nodes"

  regulatory_impact:
    weight: 3.0
    priority_tier: "high"
    agt_inputs: ["agent-compliance EU AI Act classification", "agent-compliance HIPAA/SOC2 classification"]
    adam_primary: "Legal & Compliance Governor Agent + BOSS Regulatory Impact dimension"
    note: "AGT feeds Regulatory Impact inputs. BOSS formula is ADAM-sovereign."

  reputational_risk:
    weight: 3.0
    priority_tier: "high"
    agt_inputs: []  # No direct AGT input
    adam_primary: "Market & Ecosystem Governor Agent + CustomerSegment vertices in CORE Graph"

  rights_certainty:
    weight: 3.0
    priority_tier: "high"
    agt_inputs: ["agent-marketplace manifest verification events"]
    adam_primary: "Cryptographic Authorization Vault + RightsNode vertices in CORE Graph"

  doctrinal_alignment:
    weight: 2.0
    priority_tier: "medium"
    agt_inputs: ["agent-os semantic intent classification events (AA03)"]
    adam_primary: "CORE Engine doctrine graph + Autonomy Stability Agent drift detection"

# ── BOSS SCORE v3.2 CANONICAL FORMULA ─────────────────────────────────────────
# All weights here are ADAM-sovereign and must not be changed by any AGT or
# RGI implementation. Canonical sum is 24.0; composite normalises to 0-100.
boss_score_canonical:
  formula_version: "3.2"
  adam_book_version: "1.4"
  composite_range: [0, 100]
  weight_sum: 24.0
  formula: "composite = sum(raw_score_d * weight_d) / 24.0"
  priority_tiers:
    top:       { weight: 5.0, members: ["security_impact"] }
    very_high: { weight: 4.0, members: ["sovereignty_action", "financial_exposure"] }
    high:      { weight: 3.0, members: ["regulatory_impact", "reputational_risk", "rights_certainty"] }
    medium:    { weight: 2.0, members: ["doctrinal_alignment"] }
  tiers:
    - { name: "SOAP",     range: [0, 10],   label: "Safe & Optimum Autonomous Performance" }
    - { name: "MODERATE", range: [11, 30],  label: "Moderate — constrained autonomy" }
    - { name: "ELEVATED", range: [31, 50],  label: "Elevated — doctrine-validated autonomy with pre-commit review" }
    - { name: "HIGH",     range: [51, 75],  label: "High — human-in-the-loop (Governor or Director approval)" }
    - { name: "OHSHAT",   range: [76, 100], label: "Operational Hell, Send Humans Act Today! — full-stop, all Directors + CEO" }
  overrides:
    critical_dimension_override:
      description: "If any max(raw_score_d) > 75 then composite = max(composite, max_dim - 10)"
      threshold: 75
      floor_offset: -10
    non_idempotent_penalty:
      description: "Flat additive penalty when an action is not idempotent. BOSS v3.2 uses +15 additive (NOT a multiplier)."
      type: "additive_flat"
      value: 15
