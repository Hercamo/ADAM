AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ADAM DNA Deployment Specification - AWS Stack
  Company: NetStreamX
  Platform: AWS (Warm Standby / Primary)

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [dev, staging, production]
  CompanySlug:
    Type: String
    Default: netstreamx
  PrimaryRegion:
    Type: String
    Default: us-east-1

Resources:
  # VPC for ADAM
  AdamVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "vpc-adam-${CompanySlug}-${Environment}"
        - Key: adam-company
          Value: "NetStreamX"

  # Neptune Cluster for CORE Graph
  CoreGraphCluster:
    Type: AWS::Neptune::DBCluster
    Properties:
      DBClusterIdentifier: !Sub "adam-core-${CompanySlug}-${Environment}"
      EngineVersion: "1.3.1.0"
      StorageEncrypted: true
      DeletionProtection: true
      BackupRetentionPeriod: 35
      Tags:
        - Key: adam-component
          Value: core-graph

  # S3 Bucket for Flight Recorder
  FlightRecorderBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "adam-flight-recorder-${CompanySlug}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      ObjectLockEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # EKS Cluster for Agent Mesh
  AgentMeshCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "eks-adam-${CompanySlug}-${Environment}"
      Version: "1.29"
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
          - !Ref PrivateSubnet3
        EndpointPrivateAccess: true
        EndpointPublicAccess: false
      EncryptionConfig:
        - Provider:
            KeyArn: !GetAtt EKSKey.Arn
          Resources: [secrets]

  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "adam-eks-cluster-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EKSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: ADAM EKS secrets encryption
      EnableKeyRotation: true

  # Private Subnets
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AdamVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AdamVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AdamVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [2, !GetAZs ""]

Outputs:
  VPCId:
    Value: !Ref AdamVPC
  EKSClusterName:
    Value: !Ref AgentMeshCluster
  CoreGraphEndpoint:
    Value: !GetAtt CoreGraphCluster.Endpoint
  FlightRecorderBucket:
    Value: !Ref FlightRecorderBucket
