# ADAM Monitoring - OpenTelemetry Collector + ServiceMonitors
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adam-otel-collector
  namespace: adam-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adam-otel-collector
  template:
    metadata:
      labels:
        app: adam-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.92.0
          ports:
            - containerPort: 4317  # gRPC
            - containerPort: 4318  # HTTP
            - containerPort: 8888  # metrics
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
      volumes:
        - name: otel-config
          configMap:
            name: adam-otel-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adam-otel-config
  namespace: adam-monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
      attributes:
        actions:
          - key: adam.company
            value: "NetStreamX"
            action: insert
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      logging:
        loglevel: info
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, attributes]
          exporters: [logging]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
