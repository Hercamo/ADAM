apiVersion: v2
name: adam-platform
description: ADAM Autonomous Doctrine & Architecture Model for NetStreamX
type: application
version: 1.0.0
appVersion: '0.4'
keywords:
- adam
- autonomy
- governance
- ai-agents
maintainers:
- name: ADAM DNA Deployment Tool
  email: adam@netstreamx.com
dependencies:
- name: janusgraph
  version: ~1.0
  repository: https://charts.bitnami.com/bitnami
  condition: janusgraph.enabled
- name: minio
  version: ~5.0
  repository: https://charts.min.io/
  condition: minio.enabled
- name: opa
  version: ~6.0
  repository: https://open-policy-agent.github.io/gatekeeper/charts
  condition: opa.enabled
- name: grafana
  version: ~7.0
  repository: https://grafana.github.io/helm-charts
  condition: grafana.enabled
- name: prometheus
  version: ~25.0
  repository: https://prometheus-community.github.io/helm-charts
  condition: prometheus.enabled
