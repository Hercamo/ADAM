# ============================================================
# ADAM Reference OPA Stack — Rego v1 Mode
# Generated by ADAM DNA Deployment Tool v1.2
# Aligned with: ADAM book v1.7, BOSS Formulas v3.3
# ============================================================
# Canonical reference for running the BOSS routing + company
# hard-rule policy bundle under OPA. Audit log Section 0210
# (NetStreamX initial deployment, 2026-04-23 → 2026-04-24)
# documented seven OPA 0.64.x v0 grammar booby-traps that
# silently mis-parse modern Rego idioms. The remediation —
# canonised in ADAM v1.7 — is to invoke OPA with the
# `--v1-compatible` flag and author the bundle in v1 syntax.
#
# Do NOT remove `--v1-compatible` from the `command:` block.
# Do NOT downgrade the OPA image below 0.64.1 (earlier versions
# do not support v1-compatible mode).
# ============================================================

name: adam-opa-reference

services:
  opa:
    image: openpolicyagent/opa:0.64.1
    container_name: adam-opa
    restart: unless-stopped
    # `--v1-compatible` enables Rego v1 grammar globally for this
    # OPA instance. All .rego files in /policies use `import rego.v1`
    # at the top — the flag is what makes that import behave
    # correctly under 0.64.1. See ADAM book v1.7 Appendix L for the
    # rationale. (Audit log 0210 → 0210.G.)
    command:
      - "run"
      - "--server"
      - "--v1-compatible"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      # Bind-mount the rego bundle. In production, prefer ConfigMap
      # mounts (see iac/k3d/opa-deployment.yaml) so the bundle is
      # under version control and rotates atomically.
      - ./:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8181/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Preflight Rego validator ─────────────────────────────────────
  # One-shot job that runs `opa parse` and `opa check` on every
  # rego file BEFORE the main `opa` service starts. Fails fast with
  # the offending file:line. Also pinned to 0.64.1 with v1 mode.
  # New in ADAM v1.7 (audit log 0210.G called this out as the
  # missing guardrail that would have caught all 7 iterations.)
  rego-preflight:
    image: openpolicyagent/opa:0.64.1
    container_name: adam-opa-preflight
    command:
      - "check"
      - "--v1-compatible"
      - "/policies"
    volumes:
      - ./:/policies:ro
    restart: "no"
