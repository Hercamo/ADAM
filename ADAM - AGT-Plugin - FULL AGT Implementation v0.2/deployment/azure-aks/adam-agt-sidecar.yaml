# ============================================================================
# ADAM-AGT Sidecar Injection Template for Azure AKS
# ============================================================================
#
# This file defines the template used by MutatingWebhookConfiguration to inject
# AGT sidecar containers into ADAM agent pods running on Azure AKS.
#
# The AGT sidecar injection template includes:
# 1. Agent OS policy interceptor - intercepts agent actions against CORE Graph policies
# 2. Agent Mesh identity provider - provides Ed25519 identity and mTLS
# 3. Agent Runtime ring enforcer - enforces execution rings
# 4. Agent SRE observability - metrics collection and health reporting
# 5. Agent Compliance auditor - records decisions to Flight Recorder
# 6. Agent Marketplace verifier - validates plugin artifacts
# 7. Agent Lightning optimizer - learns from policy enforcement patterns
#
# When a pod labeled with "inject-agt-sidecar: true" is created in a namespace
# labeled with "governance-injectable: true", this template is used to inject
# all 7 sidecar containers as init and regular containers.
#
# Note: This is a YAML template, not a complete Kubernetes manifest.
# It is embedded in MutatingWebhookConfiguration and processed by the webhook.

---
# ============================================================================
# INIT CONTAINERS (Run to completion before main containers start)
# ============================================================================
# Init containers set up the shared filesystem, certificates, and configuration
# that all sidecars and the main agent pod will use.

initContainers:
  # ===========================================================================
  # AGT Setup Init Container
  # ===========================================================================
  # Prepares the pod for AGT sidecar injection:
  # - Creates shared filesystem directories
  # - Mounts secrets from Azure Key Vault via SecretProvider
  # - Sets up TLS certificates
  # - Initializes CORE Graph cache
  - name: adam-agt-setup
    image: adamagtregistry.azurecr.io/adam-agt-setup:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context for setup container
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL

    # Commands to set up AGT filesystem and configuration
    command:
      - /bin/sh
      - -c
      - |
        # Create shared directories for AGT sidecars to mount
        mkdir -p /var/run/adam-agt/sockets
        mkdir -p /var/cache/adam-agt/core-graph
        mkdir -p /etc/adam-agt/policies
        mkdir -p /etc/adam-agt/mesh/tls
        mkdir -p /etc/adam-agt/runtime
        mkdir -p /etc/adam-agt/compliance
        mkdir -p /var/log/adam-agt

        # Set permissions so sidecars can access shared filesystem
        chmod 755 /var/run/adam-agt
        chmod 755 /var/cache/adam-agt
        chmod 755 /etc/adam-agt

        # Download and cache CORE Graph policies from Cosmos DB
        # This reduces latency for policy decisions during pod execution
        /usr/local/bin/adam-agt-fetch-policies.sh

        # Initialize iptables rules for Agent Mesh (zero-trust networking)
        # Note: requires NET_ADMIN and SYS_ADMIN capabilities (granted in sidecar)
        # /usr/local/bin/adam-agt-init-iptables.sh || true

        echo "AGT setup completed successfully"

    # Volume mounts for init container
    volumeMounts:
      # Shared emptyDir for inter-sidecar communication
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Shared cache for CORE Graph policies
      - name: agt-cache
        mountPath: /var/cache/adam-agt

      # Configuration directory
      - name: agt-config
        mountPath: /etc/adam-agt

      # Log directory
      - name: agt-logs
        mountPath: /var/log/adam-agt

      # Azure Key Vault secrets (mounted by SecretProvider CSI driver)
      - name: agt-identity-keys
        mountPath: /mnt/secrets/identity
        readOnly: true

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for setup
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      - name: COSMOS_DB_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: adam-agt-cosmos-db
            key: endpoint

      - name: AZURE_KEYVAULT_NAME
        value: "adam-agt-kv"

      - name: AZURE_KEYVAULT_ENDPOINT
        value: "https://adam-agt-kv.vault.azure.net/"

    # Resource limits for setup container (fast execution)
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

---
# ============================================================================
# SIDECAR CONTAINERS
# ============================================================================
# All 7 AGT packages run as sidecar containers alongside the main agent pod.
# Sidecars communicate with the main agent via:
# - HTTP APIs on localhost (policy decisions, identity, metrics)
# - Unix domain sockets (high-performance, low-latency)
# - Shared filesystem (policy cache, audit logs)

containers:
  # ===========================================================================
  # AGENT OS SIDECAR - Policy Engine and Intent Interpreter
  # ===========================================================================
  # The Agent OS package interprets Intent Objects and evaluates policies
  # from the CORE Graph. It acts as a policy interceptor between the agent
  # and external actions (API calls, model deployments, data access).
  #
  # Main responsibilities:
  # - Query CORE Graph for agent's applicable policies
  # - Evaluate Intent Objects against policies
  # - Return policy decision (allow/deny) with confidence score
  # - Log policy evaluations to Flight Recorder
  #
  # Communication:
  # - HTTP API on localhost:9001 for policy queries
  # - Unix socket at /var/run/adam-agt/sockets/agent-os.sock for performance
  - name: adam-agt-agent-os
    image: adamagtregistry.azurecr.io/adam-agent-os:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context for Agent OS container
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports exposed by Agent OS
    ports:
      - name: policy-api
        containerPort: 9001
        protocol: TCP

    # HTTP API for policy decisions
    # POST /v1/policy/evaluate - evaluate intent against policies
    # GET /health/live - liveness probe
    # GET /health/ready - readiness probe

    # Liveness probe - restarts container if policy engine hangs
    livenessProbe:
      httpGet:
        path: /health/live
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe - removes pod from load balancing if degraded
    readinessProbe:
      httpGet:
        path: /health/ready
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent OS
    volumeMounts:
      # Shared filesystem for inter-sidecar communication
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # CORE Graph policy cache (populated by setup init container)
      - name: agt-cache
        mountPath: /var/cache/adam-agt
        readOnly: true

      # Policy configuration from ConfigMap
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Log directory for policy decision logs
      - name: agt-logs
        mountPath: /var/log/adam-agt

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent OS
    env:
      # Pod metadata for policy targeting
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      - name: POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid

      # Cosmos DB endpoint for CORE Graph queries
      - name: COSMOS_DB_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: adam-agt-cosmos-db
            key: endpoint

      # Cosmos DB access key (or use Managed Identity instead)
      - name: COSMOS_DB_KEY
        valueFrom:
          secretKeyRef:
            name: adam-agt-cosmos-db
            key: key

      # Policy evaluation mode
      - name: POLICY_MODE
        value: "strict"  # or "audit"

      # Sync interval for policy cache updates
      - name: POLICY_SYNC_INTERVAL_SECONDS
        value: "30"

      # Log level
      - name: LOG_LEVEL
        value: "info"

      # Enable trace logging for policy decisions
      - name: TRACE_DECISIONS
        value: "false"

    # Resource requests and limits
    resources:
      requests:
        cpu: 100m        # Conservative - policy evaluation is lightweight
        memory: 128Mi
      limits:
        cpu: 500m        # Generous limit to handle policy query bursts
        memory: 256Mi

    # Startup probe - give container time to initialize
    startupProbe:
      httpGet:
        path: /health/ready
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30  # Allow up to 30 seconds to start

  # ===========================================================================
  # AGENT MESH SIDECAR - Cryptographic Identity Provider
  # ===========================================================================
  # The Agent Mesh package provides Ed25519 cryptographic identity and
  # manages zero-trust networking through mTLS. Every ADAM agent gets a
  # unique cryptographic identity that can be cryptographically verified.
  #
  # Main responsibilities:
  # - Provide Ed25519 private key for agent signing
  # - Implement mTLS proxy for outbound connections
  # - Enforce mutual TLS on service-to-service communication
  # - Provide certificate verification and validation
  # - Rotate ephemeral keys on schedule
  #
  # Communication:
  # - HTTP API on localhost:9002 for identity operations
  # - mTLS proxy on localhost:8443 for encrypted outbound connections
  - name: adam-agt-agent-mesh
    image: adamagtregistry.azurecr.io/adam-agent-mesh:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - restricted, no special privileges
    securityContext:
      runAsNonRoot: true
      runAsUser: 1001
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports for Agent Mesh
    ports:
      - name: identity-api
        containerPort: 9002
        protocol: TCP
      - name: mtls-proxy
        containerPort: 8443
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /health/live
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /health/ready
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent Mesh
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Ed25519 private key and certificates (from Azure Key Vault via SecretProvider)
      - name: agt-identity-keys
        mountPath: /etc/adam-agt/mesh/identity
        readOnly: true

      # mTLS certificates
      - name: agt-mesh-tls
        mountPath: /etc/adam-agt/mesh/tls
        readOnly: true

      # Configuration
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent Mesh
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Cryptographic algorithm (Ed25519 is modern and efficient)
      - name: CRYPTO_ALGORITHM
        value: "Ed25519"

      # Key rotation interval
      - name: KEY_ROTATION_INTERVAL_SECONDS
        value: "3600"  # 1 hour

      # Zero-trust mode
      - name: ZERO_TRUST_MODE
        value: "strict"

      # mTLS proxy configuration
      - name: MTLS_PROXY_PORT
        value: "8443"

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 512Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /health/ready
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT RUNTIME SIDECAR - Execution Ring Enforcement
  # ===========================================================================
  # The Agent Runtime package enforces three execution rings:
  # - Kernel ring: Direct hardware and privileged operations
  # - System ring: Privileged API calls and resource management
  # - User ring: Unprivileged operations (default for most agent actions)
  #
  # Actions are mapped to rings based on risk and resource requirements.
  # The runtime enforces that agents only execute actions allowed in their ring.
  #
  # Main responsibilities:
  # - Monitor agent process and system calls
  # - Enforce ring boundaries
  # - Prevent privilege escalation
  # - Track resource usage per ring
  # - Log ring violations to Flight Recorder
  - name: adam-agt-agent-runtime
    image: adamagtregistry.azurecr.io/adam-agent-runtime:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - requires elevated privileges for system call monitoring
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      capabilities:
        add:
          - SYS_ADMIN      # For seccomp/eBPF system call monitoring
          - SYS_PTRACE     # For process tracing and inspection
          - NET_ADMIN      # For network enforcement
        drop:
          - ALL

    # Ports for Agent Runtime
    ports:
      - name: runtime-api
        containerPort: 9003
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /health/live
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /health/ready
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent Runtime
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Runtime configuration
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Host cgroup filesystem for enforcement
      - name: cgroup
        mountPath: /sys/fs/cgroup
        readOnly: false

      # Host proc filesystem for process inspection
      - name: proc
        mountPath: /host/proc
        readOnly: true

      # Host sys filesystem for seccomp rules
      - name: sys
        mountPath: /sys
        readOnly: false

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent Runtime
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Ring enforcement mode
      - name: RING_MODE
        value: "three-ring"  # kernel, system, user

      # Enforcement action on ring violation
      - name: ENFORCEMENT_MODE
        value: "block"  # or "audit"

      # Ring definitions (JSON)
      - name: RING_DEFINITIONS
        value: |
          {
            "kernel": {
              "description": "Privileged kernel operations",
              "allowed_actions": ["direct_hardware", "kernel_configuration"]
            },
            "system": {
              "description": "System-level API calls",
              "allowed_actions": ["resource_management", "system_api"]
            },
            "user": {
              "description": "Unprivileged user operations",
              "allowed_actions": ["user_api", "data_processing"]
            }
          }

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits (higher than other sidecars due to system monitoring)
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /health/ready
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT SRE SIDECAR - Site Reliability Engineering and Observability
  # ===========================================================================
  # The Agent SRE package collects observability data from AGT and the main
  # agent pod. It provides metrics, traces, and logs to monitoring systems
  # (Azure Monitor, Prometheus, etc).
  #
  # Main responsibilities:
  # - Collect metrics from all AGT sidecars
  # - Export to Azure Monitor and Prometheus
  # - Monitor pod health and resource usage
  # - Detect anomalies and raise alerts
  # - Store short-term metrics locally
  - name: adam-agt-agent-sre
    image: adamagtregistry.azurecr.io/adam-agent-sre:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - restricted
    securityContext:
      runAsNonRoot: true
      runAsUser: 1002
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports for Agent SRE
    ports:
      - name: metrics
        containerPort: 9090
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /metrics
        port: metrics
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /ready
        port: metrics
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent SRE
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Configuration
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Metrics storage
      - name: agt-cache
        mountPath: /var/cache/adam-agt

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent SRE
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Azure Monitor integration
      - name: AZURE_MONITOR_ENABLED
        value: "true"

      - name: APPINSIGHTS_INSTRUMENTATION_KEY
        valueFrom:
          secretKeyRef:
            name: adam-agt-azure-monitor
            key: appinsights-key

      # Prometheus scrape interval
      - name: METRICS_INTERVAL_SECONDS
        value: "60"

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 400m
        memory: 256Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /ready
        port: metrics
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT COMPLIANCE SIDECAR - Regulatory Compliance and Audit
  # ===========================================================================
  # The Agent Compliance package ensures that all agent actions comply with
  # regulatory requirements (EU AI Act, DORA, NIS2, SOC2, etc.).
  #
  # Main responsibilities:
  # - Track compliance of agent actions
  # - Submit audit entries to Flight Recorder
  # - Detect compliance violations
  # - Generate compliance reports
  # - Integrate with governance frameworks
  - name: adam-agt-agent-compliance
    image: adamagtregistry.azurecr.io/adam-agent-compliance:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - restricted
    securityContext:
      runAsNonRoot: true
      runAsUser: 1003
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports for Agent Compliance
    ports:
      - name: compliance-api
        containerPort: 9004
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /health/live
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /health/ready
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent Compliance
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Compliance configuration
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Audit logs
      - name: agt-logs
        mountPath: /var/log/adam-agt

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent Compliance
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Regulatory frameworks to enforce
      - name: REGULATORY_FRAMEWORKS
        value: "EU_AI_ACT,DORA,NIS2,SOC2"

      # Flight Recorder configuration
      - name: FLIGHT_RECORDER_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: adam-agt-flight-recorder
            key: endpoint

      # Submission interval
      - name: FLIGHT_RECORDER_SUBMIT_INTERVAL_SECONDS
        value: "60"

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 400m
        memory: 256Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /health/ready
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT MARKETPLACE SIDECAR - Plugin Signing and Artifact Verification
  # ===========================================================================
  # The Agent Marketplace package verifies that all plugins and artifacts
  # have valid signatures from trusted sources, preventing supply chain attacks.
  #
  # Main responsibilities:
  # - Verify plugin signatures before execution
  # - Maintain trusted signing key registry
  # - Audit plugin deployments
  # - Prevent unsigned or untrusted plugins from running
  - name: adam-agt-agent-marketplace
    image: adamagtregistry.azurecr.io/adam-agent-marketplace:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - restricted
    securityContext:
      runAsNonRoot: true
      runAsUser: 1004
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports for Agent Marketplace
    ports:
      - name: marketplace-api
        containerPort: 9005
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /health/live
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /health/ready
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent Marketplace
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # Trusted key registry
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Temporary directory
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent Marketplace
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Artifact verification mode
      - name: ARTIFACT_VERIFICATION_MODE
        value: "strict"

      # Trusted plugin sources
      - name: TRUSTED_PLUGIN_SOURCES
        value: "adam-core,approved-partners"

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits
    resources:
      requests:
        cpu: 75m
        memory: 96Mi
      limits:
        cpu: 300m
        memory: 192Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /health/ready
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT LIGHTNING SIDECAR - Reinforcement Learning Governance Optimization
  # ===========================================================================
  # The Agent Lightning package uses reinforcement learning to optimize
  # policy enforcement and agent behavior. It learns from policy decisions,
  # enforcement outcomes, and agent performance to continuously improve
  # governance effectiveness.
  #
  # Main responsibilities:
  # - Collect reinforcement learning training data
  # - Train and update policy optimization models
  # - Provide action recommendations to improve agent effectiveness
  # - Detect policy pattern anomalies
  # - Optimize policy decisions based on historical outcomes
  - name: adam-agt-agent-lightning
    image: adamagtregistry.azurecr.io/adam-agent-lightning:1.1.0
    imagePullPolicy: IfNotPresent

    # Security context - restricted
    securityContext:
      runAsNonRoot: true
      runAsUser: 1005
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Ports for Agent Lightning
    ports:
      - name: lightning-api
        containerPort: 9006
        protocol: TCP

    # Liveness probe
    livenessProbe:
      httpGet:
        path: /health/live
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    # Readiness probe
    readinessProbe:
      httpGet:
        path: /health/ready
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts for Agent Lightning
    volumeMounts:
      # Shared filesystem
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt

      # RL models and training data
      - name: lightning-models
        mountPath: /var/lib/adam-agt/lightning

      # Configuration
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true

      # Temporary directory for model training
      - name: tmp-volume
        mountPath: /tmp

    # Environment variables for Agent Lightning
    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # RL learning mode
      - name: RL_LEARNING_MODE
        value: "online"  # continuous learning

      # Model update frequency
      - name: MODEL_UPDATE_INTERVAL_SECONDS
        value: "300"  # 5 minutes

      # Reward function for optimization
      - name: REWARD_FUNCTION
        value: "compliance_score"

      # Log level
      - name: LOG_LEVEL
        value: "info"

    # Resource requests and limits (higher for ML workloads)
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    # Startup probe
    startupProbe:
      httpGet:
        path: /health/ready
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

---
# ============================================================================
# VOLUMES - Shared filesystem and configuration
# ============================================================================
# These volumes are shared between the init containers, sidecars, and the
# main agent pod to enable inter-process communication and configuration.

volumes:
  # Shared emptyDir for inter-sidecar communication via Unix sockets
  # Location: /var/run/adam-agt/sockets/
  - name: agt-shared-fs
    emptyDir:
      medium: Memory  # Faster than disk
      sizeLimit: 256Mi

  # Policy cache populated by init container
  # Location: /var/cache/adam-agt/
  - name: agt-cache
    emptyDir:
      medium: Memory
      sizeLimit: 512Mi

  # AGT configuration from ConfigMaps and Secrets
  # Location: /etc/adam-agt/
  - name: agt-config
    projected:
      sources:
        # Policy configuration
        - configMap:
            name: adam-agt-policies
            items:
              - key: policies.yaml
                path: policies.yaml
        # Compliance configuration
        - configMap:
            name: adam-agt-compliance-rules
            items:
              - key: rules.yaml
                path: compliance/rules.yaml

  # Log directory for audit and debug logs
  # Location: /var/log/adam-agt/
  - name: agt-logs
    emptyDir:
      medium: Memory
      sizeLimit: 256Mi

  # Temporary directory
  - name: tmp-volume
    emptyDir:
      medium: Memory
      sizeLimit: 128Mi

  # Azure Key Vault secrets mounted via SecretProvider CSI driver
  # This enables automatic key rotation and RBAC-based access
  # Location: /mnt/secrets/identity/
  - name: agt-identity-keys
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        # Azure Key Vault provider for Kubernetes SecretProvider
        provider: azure
        keyvaultName: adam-agt-kv
        tenantId: ${AZURE_TENANT_ID}
        # Specific secrets to mount
        objects: |
          array:
            - |
              objectName: adam-agt-mesh-ed25519-key
              objectType: secret
              objectVersion: ""
            - |
              objectName: adam-agt-mesh-ed25519-pub
              objectType: secret
              objectVersion: ""

  # mTLS certificates from Azure Key Vault
  - name: agt-mesh-tls
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        provider: azure
        keyvaultName: adam-agt-kv
        tenantId: ${AZURE_TENANT_ID}
        objects: |
          array:
            - |
              objectName: adam-agt-sidecar-tls-cert
              objectType: secret
              objectVersion: ""
            - |
              objectName: adam-agt-sidecar-tls-key
              objectType: secret
              objectVersion: ""
            - |
              objectName: adam-agt-sidecar-ca-cert
              objectType: secret
              objectVersion: ""

  # Host filesystem mounts (read-only for security)
  # These are used by Agent Runtime for system call monitoring
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
      type: Directory

  - name: proc
    hostPath:
      path: /proc
      type: Directory

  - name: sys
    hostPath:
      path: /sys
      type: Directory

  # RL models persistent volume (if using persistent storage)
  - name: lightning-models
    emptyDir: {}  # Can be replaced with persistentVolumeClaim if needed

---
# ============================================================================
# ADDITIONAL POD-LEVEL CONFIGURATION
# ============================================================================
# These settings apply to the entire pod (main agent + all sidecars)

# DNS configuration for agent pod
dnsPolicy: ClusterFirst

# Service account for pod (should be the agent's service account, not AGT's)
# The webhook modifies this before pod creation
serviceAccountName: adam-agent  # Will be populated by main agent deployment

# Restart policy for pod
restartPolicy: Always

# Termination grace period (time allowed for graceful shutdown)
terminationGracePeriodSeconds: 30

# Affinity rules (pod scheduling)
# Ensure AGT sidecars run on the same node as the agent pod
affinity:
  podAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - adam-agent
          topologyKey: kubernetes.io/hostname

# Node affinity for machine type and region
nodeAffinity:
  preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 50
      preference:
        matchExpressions:
          - key: agentpool
            operator: In
            values:
              - governance
              - system

# Tolerations for tainted nodes
tolerations: []

# Priority class (if defined)
priorityClassName: system-cluster-critical

# Security policy (applied pod-wide)
podSecurityPolicy: restricted
