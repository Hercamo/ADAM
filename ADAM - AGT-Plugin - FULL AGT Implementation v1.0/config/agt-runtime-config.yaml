# AGT Agent Runtime Configuration
# Integration with ADAM's Orchestration Plane and 5-layer agent topology
# Execution rings, saga orchestration, kill switches, and recovery strategies
# Updated: 2026-04-11

# Agent Runtime: Execution environment for autonomous agents
# AGT's Agent Runtime package provides execution rings, saga orchestration,
# distributed transactions, and automatic recovery mechanisms
agentRuntime:
  enabled: true

  # Overall runtime configuration
  runtimeMode: "production"  # production, staging, development
  concurrencyLimit: 1000      # Max concurrent agent executions
  queueCapacity: 100000       # Max pending execution requests

  # Execution Rings: Security isolation boundaries for agent execution
  # Each ring has different privileges and oversight levels
  executionRings:
    enabled: true

    # Ring 0: Highest privilege, reserved for critical ADAM operations
    # Maps to Intent Layer agents (human interface, system entry points)
    ring0:
      ringId: "ring-0-intent"
      layerName: "Intent/Human Interface Layer"
      description: "User intent capture and system entry points"
      agentLayers:
        - "intent-layer"
      privilegeLevel: 10  # Highest privilege
      # Ring 0 agents require explicit human approval for certain actions
      requiresApprovalFor:
        - "major-policy-changes"
        - "exception-economy-allocations"
        - "constitution-amendments"
      # Ring 0 agents have no autonomy budget limits (user-driven)
      autonomyBudget: -1  # Unlimited
      # Memory isolation: each Ring 0 agent gets isolated memory space
      memoryIsolation: true
      maxMemoryMB: 2048
      # Strict logging: every action is logged
      strictLogging: true
      logLevel: "debug"

    # Ring 1: Domain governance and policy enforcement
    # Maps to Governor Agent Layer
    ring1:
      ringId: "ring-1-governor-agent"
      layerName: "Governor Agents (Domain Governance)"
      description: "Domain-specific policy enforcement and orchestration"
      agentLayers:
        - "governor-agent-layer"
      privilegeLevel: 8
      # Ring 1 agents enforce core domain policies
      requiredPolicies:
        - "domain-policy-framework"
        - "compliance-baseline"
        - "security-baseline"
      # Autonomy budget: allocated per agent per time window
      autonomyBudget:
        enabled: true
        budgetType: "per-agent-per-hour"
        budgetAmount: 1000
        # Budget replenishes hourly
        replenishInterval: 3600
      # Memory per agent
      memoryIsolation: true
      maxMemoryMB: 1024
      # Audit all decisions
      auditAllDecisions: true
      logLevel: "info"

    # Ring 2: Orchestration and coordination
    # Maps to Orchestration Layer
    ring2:
      ringId: "ring-2-orchestration"
      layerName: "Orchestration Layer"
      description: "Request routing and saga coordination"
      agentLayers:
        - "orchestration-layer"
      privilegeLevel: 6
      # Orchestration agents coordinate work across other agents
      maxCoordinatedAgents: 50  # Can coordinate up to 50 other agents
      # Autonomy budget for orchestration decisions
      autonomyBudget:
        enabled: true
        budgetType: "per-agent-per-hour"
        budgetAmount: 5000
        replenishInterval: 3600
      memoryIsolation: true
      maxMemoryMB: 512
      auditAllDecisions: true
      logLevel: "info"

    # Ring 3: Work group execution
    # Maps to Work Group Agents Layer
    ring3:
      ringId: "ring-3-workgroup"
      layerName: "Work Group Agents"
      description: "Domain-specific task execution"
      agentLayers:
        - "workgroup-layer"
      privilegeLevel: 4
      # Work group agents perform actual business tasks
      maxTasksPerAgent: 100  # Concurrent tasks
      # Autonomy budget for work execution
      autonomyBudget:
        enabled: true
        budgetType: "per-agent-per-hour"
        budgetAmount: 10000
        replenishInterval: 3600
      memoryIsolation: true
      maxMemoryMB: 256
      logLevel: "info"

    # Ring 4: Meta-governance and system monitoring
    # Maps to Digital Twin/Meta-Governance Layer
    ring4:
      ringId: "ring-4-digital-twin"
      layerName: "Digital Twins/Meta-Governance"
      description: "System monitoring and self-optimization"
      agentLayers:
        - "digital-twin-layer"
      privilegeLevel: 7  # High privilege for monitoring
      # Digital twins have read access to system state
      readOnlyMode: false  # Some write access for self-correction
      # Autonomy for meta-governance decisions
      autonomyBudget:
        enabled: true
        budgetType: "per-agent-per-hour"
        budgetAmount: 500
        replenishInterval: 3600
      memoryIsolation: true
      maxMemoryMB: 512
      logLevel: "info"

  # Saga Orchestration: Distributed transaction coordination
  # Sagas coordinate work across multiple agents and enforce consistency
  sagaOrchestration:
    enabled: true

    # Saga engine configuration
    engine: "temporal"  # Using Temporal as saga engine

    # Saga timeout and max duration
    maxSagaDuration: 86400  # 24 hours
    sagaTimeout: 3600      # 1 hour default
    # Timeout per step in saga
    stepTimeout: 300       # 5 minutes per step

    # Saga state storage
    stateStorage:
      type: "postgresql"
      endpoint: "postgresql.adam-governance.svc.cluster.local:5432"
      database: "adam_sagas"
      # Encrypted storage of saga state
      encryption: true
      encryptionKey: "/secrets/saga-state-key"

    # Saga execution strategy
    executionStrategy:
      # Serialization: how strictly should sagas be coordinated
      isolationLevel: "serializable"
      # Retry policy for failed saga steps
      maxRetries: 3
      retryBackoff: "exponential"
      initialBackoffMs: 100
      maxBackoffMs: 30000

    # Compensating transactions: undo actions if saga fails
    compensation:
      enabled: true
      # Require each step to have a compensation action
      requireCompensation: true
      # Timeout for compensation (seconds)
      compensationTimeout: 1800
      # Store compensation history
      logCompensations: true

    # Saga coordination with ADAM's 4 enforcement hooks
    adamEnforcementHooks:
      enabled: true
      # Hook 1: Pre-decision validation
      preDecisionValidation:
        enabled: true
        # Validate against current BOSS scores before starting saga
        validateBossScores: true
        # Validate against active policies
        validatePolicies: true
      # Hook 2: During-execution monitoring
      duringExecutionMonitoring:
        enabled: true
        # Monitor saga steps for policy violations
        monitorPolicyCompliance: true
        # Monitor for BOSS score changes that might invalidate saga
        monitorBossScoreChanges: true
        # Interval to check (ms)
        monitoringInterval: 1000
      # Hook 3: Post-completion validation
      postCompletionValidation:
        enabled: true
        # Verify saga completed successfully
        verifyCompletion: true
        # Audit saga results
        auditResults: true
        # Feed results to Flight Recorder
        recordToFlightRecorder: true
      # Hook 4: Exception handling and escalation
      exceptionHandling:
        enabled: true
        # Route saga failures to Exception Economy
        escalateToExceptionEconomy: true
        # Determine recovery path (retry vs compensation vs escalation)
        autoRecoveryEnabled: true

    # Saga monitoring and observability
    monitoring:
      enabled: true
      # Track saga execution metrics
      trackExecutionTime: true
      # Track compensation invocations
      trackCompensations: true
      # Alert on saga failures
      alertOnFailure: true

  # Kill Switch: Emergency stop for runaway agents
  # Kill switch hierarchy maps to BOSS OHSHAT tier (76-100)
  killSwitch:
    enabled: true

    # Kill switch triggers: conditions that activate kill switch
    triggers:
      # Trigger 1: Explicit BOSS OHSHAT detection
      bossOhshatTrigger:
        enabled: true
        # Any dimension hitting OHSHAT (81+)
        thresholdScore: 81
        # Dimensions that trigger kill switch
        triggerDimensions:
          - "security"
          - "sovereignty"
          - "regulatory"
          - "rights"

      # Trigger 2: Agent behavior anomaly (runaway execution)
      behaviorAnomalyTrigger:
        enabled: true
        # CPU spike threshold (percentage)
        cpuThreshold: 90
        # Memory spike threshold (percentage)
        memoryThreshold: 95
        # Execution time threshold (seconds)
        executionTimeThreshold: 300
        # Rate of decisions (decisions/second)
        decisionRateThreshold: 1000

      # Trigger 3: Policy violation severity
      policyViolationTrigger:
        enabled: true
        # Critical policy violations trigger kill switch
        severityLevel: "critical"

      # Trigger 4: Manual activation
      manualTrigger:
        enabled: true
        # Who can manually trigger kill switch
        authorizedActors:
          - "chief-executive-officer"
          - "chief-information-security-officer"
          - "chief-legal-officer"
          - "on-call-sre"

    # Kill switch actions: what happens when triggered
    actions:
      # Immediate termination of agent
      terminateAgent: true
      # Graceful shutdown (drain in-flight requests)
      gracefulShutdown: true
      gracefulShutdownTimeout: 60  # seconds

      # Escalation and notification
      escalate: true
      notificationChannels:
        - "ops-slack"
        - "pagerduty"
        - "incident-dashboard"

      # Forensics collection
      collectForensics: true
      forensicActions:
        - "capture-agent-state"
        - "capture-audit-logs"
        - "capture-memory-dump"
        - "seal-evidence-for-flight-recorder"

      # Audit trail
      recordToFlightRecorder: true

  # Recovery strategies: how to recover from failures
  recovery:
    enabled: true

    # Recovery strategy selection (automatic based on failure type)
    strategies:
      # Strategy 1: Retry with backoff
      retryWithBackoff:
        enabled: true
        # For transient failures
        applicableToFailures:
          - "timeout"
          - "temporary-resource-unavailable"
          - "network-error"
        maxRetries: 5
        backoffStrategy: "exponential"
        initialDelayMs: 100
        maxDelayMs: 30000

      # Strategy 2: Failover to replica
      failover:
        enabled: true
        applicableToFailures:
          - "agent-crash"
          - "node-failure"
        # Require multiple healthy replicas
        minHealthyReplicas: 1
        # Failover timeout
        failoverTimeout: 30

      # Strategy 3: Circuit breaker
      circuitBreaker:
        enabled: true
        applicableToFailures:
          - "service-degradation"
          - "cascading-failure"
        # Failure threshold to open circuit
        failureThreshold: 5
        # Time to stay open before attempting reset
        openDuration: 60
        # Number of successes to fully close circuit
        halfOpenSuccesses: 2

      # Strategy 4: Compensation (undo work)
      compensation:
        enabled: true
        applicableToFailures:
          - "saga-failure"
          - "policy-violation-during-execution"
        # Use compensating transactions
        useCompensatingTransactions: true

      # Strategy 5: Escalation (human intervention)
      escalation:
        enabled: true
        applicableToFailures:
          - "unrecoverable-error"
          - "policy-violation-critical"
          - "authorization-failure"
        escalationTarget: "exception-economy"

  # Scheduled execution: for periodic/cron-like work
  scheduledExecution:
    enabled: true
    # Scheduler backend
    scheduler: "quartz"
    # Max concurrent scheduled jobs
    maxConcurrentJobs: 100
    # Persist job state
    persistenceEnabled: true

  # Resource limits and quotas per agent
  resourceManagement:
    enabled: true
    # CPU quota per agent (millicores)
    cpuQuotaPerAgent: 500
    # Memory quota per agent (MB)
    memoryQuotaPerAgent: 256
    # Network bandwidth quota (Mbps)
    networkQuotaPerAgent: 10
    # Disk quota per agent (GB)
    diskQuotaPerAgent: 10
    # Enforce strict limits (kill agent if exceeded)
    enforceStrictLimits: false
    # Warn if usage exceeds threshold (%)
    warningThreshold: 80

  # Execution observability and tracing
  observability:
    enabled: true
    # OpenTelemetry tracing
    tracingEnabled: true
    tracingSampleRate: 0.1
    # Metrics export
    metricsEnabled: true
    metricsExportInterval: 30
    # Detailed execution logging
    detailedLogging: true
    # Log every state transition
    logStateTransitions: true

# Runtime initialization and startup sequence
startup:
  # Health checks before accepting traffic
  preflightChecks:
    enabled: true
    checks:
      - "connectivity-to-policy-engine"
      - "connectivity-to-flight-recorder"
      - "connectivity-to-exception-economy"
      - "validity-of-agent-identities"
      - "startup-of-execution-rings"
  # Timeout for startup (seconds)
  startupTimeout: 300
  # Initialize in order (dependency ordering)
  initializeInOrder:
    - "digital-twin-agents"
    - "governor-agents"
    - "orchestration-agents"
    - "workgroup-agents"
    - "intent-agents"
