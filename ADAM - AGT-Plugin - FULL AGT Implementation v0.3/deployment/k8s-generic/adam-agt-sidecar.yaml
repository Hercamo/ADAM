# ============================================================================
# ADAM-AGT Sidecar Injection Template for Generic Kubernetes
# ============================================================================
#
# This template is used by MutatingWebhookConfiguration to inject AGT sidecar
# containers into ADAM agent pods on any Kubernetes distribution.
#
# Key differences from Azure AKS version:
# - Uses HashiCorp Vault for key management (instead of Azure Key Vault)
# - Uses Prometheus metrics export (instead of Azure Monitor)
# - Uses generic persistent volumes (instead of Azure managed disks)
# - Uses Kubernetes Secrets for configuration (instead of Azure-specific features)
#
# All 7 AGT packages are included as sidecar containers with the same
# functionality as the AKS deployment, but using open-source components.

---
# ============================================================================
# INIT CONTAINERS
# ============================================================================

initContainers:
  # ===========================================================================
  # AGT Setup Init Container
  # ===========================================================================
  # Initializes the pod filesystem and configuration for AGT injection
  - name: adam-agt-setup
    image: adam-registry.example.com/adam-agt-setup:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL

    command:
      - /bin/sh
      - -c
      - |
        # Create shared directories for AGT sidecars
        mkdir -p /var/run/adam-agt/sockets
        mkdir -p /var/cache/adam-agt/core-graph
        mkdir -p /etc/adam-agt/policies
        mkdir -p /etc/adam-agt/mesh/tls
        mkdir -p /etc/adam-agt/runtime
        mkdir -p /etc/adam-agt/compliance
        mkdir -p /var/log/adam-agt

        # Set permissions
        chmod 755 /var/run/adam-agt
        chmod 755 /var/cache/adam-agt
        chmod 755 /etc/adam-agt

        # Fetch policy cache from policy database
        # For generic K8s, this queries the PostgreSQL database configured in values-k8s.yaml
        /usr/local/bin/adam-agt-fetch-policies.sh || true

        echo "AGT setup completed successfully"

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-cache
        mountPath: /var/cache/adam-agt
      - name: agt-config
        mountPath: /etc/adam-agt
      - name: agt-logs
        mountPath: /var/log/adam-agt
      - name: vault-token
        mountPath: /var/run/secrets/tokens
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Policy database configuration (from values-k8s.yaml)
      - name: POLICY_DATABASE_HOST
        value: "postgresql.example.com"

      - name: POLICY_DATABASE_PORT
        value: "5432"

      - name: POLICY_DATABASE_NAME
        value: "adam-core-graph"

      - name: VAULT_ADDR
        value: "https://vault.example.com:8200"

      - name: VAULT_SKIP_VERIFY
        value: "false"

    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

---
# ============================================================================
# SIDECAR CONTAINERS
# ============================================================================

containers:
  # ===========================================================================
  # AGENT OS SIDECAR - Policy Engine
  # ===========================================================================
  # Same functionality as AKS version, using PostgreSQL for policy database
  - name: adam-agt-agent-os
    image: adam-registry.example.com/adam-agent-os:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: policy-api
        containerPort: 9001
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-cache
        mountPath: /var/cache/adam-agt
        readOnly: true
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: agt-logs
        mountPath: /var/log/adam-agt
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      - name: POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid

      # Policy database configuration (PostgreSQL instead of Cosmos DB)
      - name: POLICY_DATABASE_HOST
        value: "postgresql.example.com"

      - name: POLICY_DATABASE_PORT
        value: "5432"

      - name: POLICY_DATABASE_NAME
        value: "adam-core-graph"

      - name: POLICY_DATABASE_USER
        value: "adam-agt"

      - name: POLICY_DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: adam-postgres-credentials
            key: password

      # Policy evaluation mode
      - name: POLICY_MODE
        value: "strict"

      # Sync interval for policy cache updates
      - name: POLICY_SYNC_INTERVAL_SECONDS
        value: "30"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: policy-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT MESH SIDECAR - Cryptographic Identity Provider
  # ===========================================================================
  # Uses HashiCorp Vault for key management instead of Azure Key Vault
  - name: adam-agt-agent-mesh
    image: adam-registry.example.com/adam-agent-mesh:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1001
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: identity-api
        containerPort: 9002
        protocol: TCP
      - name: mtls-proxy
        containerPort: 8443
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-identity-keys
        mountPath: /etc/adam-agt/mesh/identity
        readOnly: true
      - name: agt-mesh-tls
        mountPath: /etc/adam-agt/mesh/tls
        readOnly: true
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: vault-token
        mountPath: /var/run/secrets/tokens
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Vault configuration for key management
      - name: VAULT_ADDR
        value: "https://vault.example.com:8200"

      - name: VAULT_SKIP_VERIFY
        value: "false"

      # Vault Kubernetes authentication
      - name: VAULT_AUTH_METHOD
        value: "kubernetes"

      - name: VAULT_AUTH_PATH
        value: "kubernetes"

      # Cryptographic algorithm
      - name: CRYPTO_ALGORITHM
        value: "Ed25519"

      # Key rotation interval
      - name: KEY_ROTATION_INTERVAL_SECONDS
        value: "3600"

      # Zero-trust mode
      - name: ZERO_TRUST_MODE
        value: "strict"

      - name: MTLS_PROXY_PORT
        value: "8443"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 512Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: identity-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT RUNTIME SIDECAR - Execution Ring Enforcement
  # ===========================================================================
  # Same as AKS version - no cloud-specific dependencies
  - name: adam-agt-agent-runtime
    image: adam-registry.example.com/adam-agent-runtime:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      capabilities:
        add:
          - SYS_ADMIN
          - SYS_PTRACE
          - NET_ADMIN
        drop:
          - ALL

    ports:
      - name: runtime-api
        containerPort: 9003
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: cgroup
        mountPath: /sys/fs/cgroup
        readOnly: false
      - name: proc
        mountPath: /host/proc
        readOnly: true
      - name: sys
        mountPath: /sys
        readOnly: false
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Ring enforcement mode
      - name: RING_MODE
        value: "three-ring"

      # Enforcement action on ring violation
      - name: ENFORCEMENT_MODE
        value: "block"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: runtime-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT SRE SIDECAR - Observability (Prometheus instead of Azure Monitor)
  # ===========================================================================
  # Uses Prometheus for metrics export instead of Azure Monitor
  - name: adam-agt-agent-sre
    image: adam-registry.example.com/adam-agent-sre:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1002
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: metrics
        containerPort: 9090
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /metrics
        port: metrics
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /ready
        port: metrics
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: agt-cache
        mountPath: /var/cache/adam-agt
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Prometheus integration
      - name: PROMETHEUS_ENABLED
        value: "true"

      - name: PROMETHEUS_PUSHGATEWAY
        value: "prometheus-pushgateway.monitoring.svc.cluster.local:9091"

      # Metrics scrape interval
      - name: METRICS_INTERVAL_SECONDS
        value: "60"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 400m
        memory: 256Mi

    startupProbe:
      httpGet:
        path: /ready
        port: metrics
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT COMPLIANCE SIDECAR - Regulatory Compliance
  # ===========================================================================
  # Uses external Flight Recorder database instead of Azure Confidential Ledger
  - name: adam-agt-agent-compliance
    image: adam-registry.example.com/adam-agent-compliance:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1003
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: compliance-api
        containerPort: 9004
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: agt-logs
        mountPath: /var/log/adam-agt
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # Regulatory frameworks to enforce
      - name: REGULATORY_FRAMEWORKS
        value: "EU_AI_ACT,DORA,NIS2,SOC2"

      # Flight Recorder database configuration
      - name: FLIGHT_RECORDER_HOST
        value: "flight-recorder.example.com"

      - name: FLIGHT_RECORDER_PORT
        value: "5432"

      - name: FLIGHT_RECORDER_USER
        value: "adam-flight-recorder"

      - name: FLIGHT_RECORDER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: adam-flight-recorder-credentials
            key: password

      # Submission interval
      - name: FLIGHT_RECORDER_SUBMIT_INTERVAL_SECONDS
        value: "60"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 400m
        memory: 256Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: compliance-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT MARKETPLACE SIDECAR - Plugin Verification
  # ===========================================================================
  # Same as AKS version - no cloud-specific dependencies
  - name: adam-agt-agent-marketplace
    image: adam-registry.example.com/adam-agent-marketplace:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1004
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: marketplace-api
        containerPort: 9005
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      - name: ARTIFACT_VERIFICATION_MODE
        value: "strict"

      - name: TRUSTED_PLUGIN_SOURCES
        value: "adam-core,approved-partners"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 75m
        memory: 96Mi
      limits:
        cpu: 300m
        memory: 192Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: marketplace-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

  # ===========================================================================
  # AGENT LIGHTNING SIDECAR - Reinforcement Learning Optimization
  # ===========================================================================
  # Uses Kubernetes PersistentVolumes for model storage
  - name: adam-agt-agent-lightning
    image: adam-registry.example.com/adam-agent-lightning:1.1.0
    imagePullPolicy: IfNotPresent

    securityContext:
      runAsNonRoot: true
      runAsUser: 1005
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    ports:
      - name: lightning-api
        containerPort: 9006
        protocol: TCP

    livenessProbe:
      httpGet:
        path: /health/live
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health/ready
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

    volumeMounts:
      - name: agt-shared-fs
        mountPath: /var/run/adam-agt
      - name: lightning-models
        mountPath: /var/lib/adam-agt/lightning
      - name: agt-config
        mountPath: /etc/adam-agt
        readOnly: true
      - name: tmp-volume
        mountPath: /tmp

    env:
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      # RL learning mode
      - name: RL_LEARNING_MODE
        value: "online"

      # Model update frequency
      - name: MODEL_UPDATE_INTERVAL_SECONDS
        value: "300"

      # Reward function
      - name: REWARD_FUNCTION
        value: "compliance_score"

      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    startupProbe:
      httpGet:
        path: /health/ready
        port: lightning-api
        scheme: HTTPS
      initialDelaySeconds: 0
      periodSeconds: 1
      timeoutSeconds: 5
      failureThreshold: 30

---
# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  # Shared filesystem for inter-sidecar communication
  - name: agt-shared-fs
    emptyDir:
      medium: Memory
      sizeLimit: 256Mi

  # Policy cache
  - name: agt-cache
    emptyDir:
      medium: Memory
      sizeLimit: 512Mi

  # Configuration from ConfigMaps
  - name: agt-config
    projected:
      sources:
        - configMap:
            name: adam-agt-policies
            items:
              - key: policies.yaml
                path: policies.yaml
        - configMap:
            name: adam-agt-compliance-rules
            items:
              - key: rules.yaml
                path: compliance/rules.yaml

  # Log directory
  - name: agt-logs
    emptyDir:
      medium: Memory
      sizeLimit: 256Mi

  # Temporary directory
  - name: tmp-volume
    emptyDir:
      medium: Memory
      sizeLimit: 128Mi

  # Vault token for pod authentication to Vault
  # This is populated by Vault Agent Injector
  - name: vault-token
    projected:
      sources:
        - serviceAccountToken:
            audience: vault
            expirationSeconds: 600
            path: vault

  # Identity keys from Vault (via init container)
  - name: agt-identity-keys
    emptyDir:
      medium: Memory
      sizeLimit: 64Mi

  # mTLS certificates
  - name: agt-mesh-tls
    emptyDir:
      medium: Memory
      sizeLimit: 32Mi

  # Host filesystem mounts (read-only for security)
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
      type: Directory

  - name: proc
    hostPath:
      path: /proc
      type: Directory

  - name: sys
    hostPath:
      path: /sys
      type: Directory

  # RL models persistent volume (generic PVC)
  - name: lightning-models
    emptyDir: {}

---
# ============================================================================
# POD-LEVEL CONFIGURATION
# ============================================================================

dnsPolicy: ClusterFirst
restartPolicy: Always
terminationGracePeriodSeconds: 30

# Affinity rules
affinity:
  podAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - adam-agent
          topologyKey: kubernetes.io/hostname

  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values:
                - linux

priorityClassName: system-cluster-critical
