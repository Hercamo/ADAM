apiVersion: v2
name: adam-umbrella
description: |
  Umbrella chart that deploys the ADAM Doctrine skeleton inside a single
  k3d cluster for sovereign, air-gapped deployments. Composed of five
  sub-releases: constitution (5 canonical Directors), core (CORE Engine),
  boss-score (BOSS v3.2 canonical 7 dimensions), flight-recorder, and
  agent-mesh (81+ agents across 7 canonical classes). Aligned with ADAM
  book v1.4.
