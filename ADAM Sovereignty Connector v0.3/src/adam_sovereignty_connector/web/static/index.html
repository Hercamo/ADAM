<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ADAM Sovereignty Connector</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: -apple-system, system-ui, "Segoe UI", sans-serif; background: #0b0f14; color: #d8e0ea; margin: 0; }
    header { padding: 20px 28px; border-bottom: 1px solid #1b2230; background: #0f1520; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
    .badge { background: #1a2a3f; color: #8fc0ff; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    main { padding: 24px 28px; max-width: 1100px; }
    section { margin-bottom: 32px; }
    h2 { font-size: 15px; color: #9fb2c8; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; }
    button { background: #1e2a3f; color: #d8e0ea; border: 1px solid #2a3a55; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #253552; }
    pre { background: #0f1520; border: 1px solid #1b2230; padding: 12px; border-radius: 6px; overflow: auto; max-height: 320px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #1b2230; font-size: 13px; }
    th { color: #9fb2c8; font-weight: 500; }
    .risk-read { color: #88c58b; }
    .risk-low { color: #b1c97a; }
    .risk-high { color: #e0b857; }
    .risk-privileged { color: #e0746b; }
    footer { padding: 12px 28px; font-size: 12px; color: #6b7b93; border-top: 1px solid #1b2230; }
  </style>
</head>
<body>
  <header>
    <h1>ADAM Sovereignty Connector <span class="badge" id="version">v1.1.0</span></h1>
    <span id="health"></span>
  </header>
  <main>
    <section>
      <h2>Deployment plan</h2>
      <button onclick="loadPlan()">Refresh</button>
      <pre id="plan">Loading…</pre>
    </section>
    <section>
      <h2>Command catalog</h2>
      <button onclick="loadCatalog()">Refresh</button>
      <table id="catalog"><thead><tr><th>Command</th><th>Risk</th><th>Summary</th></tr></thead><tbody></tbody></table>
    </section>
    <section>
      <h2>Cluster status</h2>
      <button onclick="loadStatus()">Refresh</button>
      <pre id="status">click Refresh</pre>
    </section>
    <section>
      <h2>Audit log (last 20)</h2>
      <button onclick="loadAudit()">Refresh</button>
      <pre id="audit">—</pre>
    </section>
  </main>
  <footer>
    Loopback-only control plane. MCP endpoint for Claude: stdio or tcp://127.0.0.1:8766.
  </footer>
  <script>
    async function fetchJSON(url) {
      const r = await fetch(url);
      return r.json();
    }
    async function loadPlan() {
      const d = await fetchJSON("/api/plan");
      document.getElementById("plan").textContent = d.plan.map(
        p => `${String(p.step).padStart(2)}. [${p.risk.padEnd(10)}] ${p.command.padEnd(28)} ${p.note}`
      ).join("\n");
    }
    async function loadCatalog() {
      const d = await fetchJSON("/api/catalog");
      const tbody = document.querySelector("#catalog tbody");
      tbody.innerHTML = "";
      for (const c of d.commands) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${c.name}</td><td class="risk-${c.risk}">${c.risk}</td><td>${c.summary}</td>`;
        tbody.appendChild(tr);
      }
    }
    async function loadStatus() {
      document.getElementById("status").textContent = "Loading…";
      const d = await fetchJSON("/api/status");
      document.getElementById("status").textContent = JSON.stringify(d, null, 2);
    }
    async function loadAudit() {
      const d = await fetchJSON("/api/audit?limit=20");
      document.getElementById("audit").textContent =
        d.entries.map(e => `[${e.ts}] ${e.actor.padEnd(10)} ${e.command.padEnd(28)} ${e.result}`).join("\n");
    }
    (async () => {
      try {
        const h = await fetchJSON("/api/health");
        document.getElementById("health").textContent = h.ok ? "● online" : "● offline";
      } catch { document.getElementById("health").textContent = "● offline"; }
      loadPlan();
      loadCatalog();
      loadAudit();
    })();
  </script>
</body>
</html>
