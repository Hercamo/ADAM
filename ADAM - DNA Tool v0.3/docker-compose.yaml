# =============================================================
# ADAM DNA Tool - Docker Compose for Local Development
# =============================================================
# Usage:
#   cp .env.example .env  (and fill in your API keys)
#   docker compose up --build
#   Open http://localhost:3000
# =============================================================
# Note: the top-level `version:` key was removed — Compose v2 ignores it and
# emits a deprecation warning. File is implicitly v3.x Compose syntax.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adam-dna-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
      - ADAM_DOCS_PATH=/app/adam-docs
      - DNA_TOOL_PATH=/app/dna-tool
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    volumes:
      - ./backend/app:/app/app  # Hot reload in dev
      - adam-uploads:/data/uploads
      - adam-output:/data/output
      - ../ADAM DNA Deployment Tool:/app/dna-tool:ro  # Mount existing DNA tool
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adam-dna-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  adam-uploads:
  adam-output:
