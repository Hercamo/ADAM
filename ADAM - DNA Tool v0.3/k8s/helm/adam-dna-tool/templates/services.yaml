---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adam-dna-tool.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "adam-dna-tool.name" . }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "adam-dna-tool.name" . }}
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adam-dna-tool.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "adam-dna-tool.name" . }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "adam-dna-tool.name" . }}
    app.kubernetes.io/component: frontend
