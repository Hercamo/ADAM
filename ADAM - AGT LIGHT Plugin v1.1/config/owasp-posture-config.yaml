# ══════════════════════════════════════════════════════════════════════════════
# ADAM AGT Light — OWASP Agentic Application Top 10 Enforcement Configuration
# ══════════════════════════════════════════════════════════════════════════════
# This file documents the OWASP AA01-AA10 enforcement posture for ADAM + AGT
# Light deployments. It serves as:
#
# 1. RUNTIME CONFIGURATION: Settings that affect enforcement behaviour
# 2. AUDIT RECORD: Documents which ADAM components and AGT packages address
#    each OWASP risk
# 3. AI FEED: Machine-readable source for deployment validation agents
#
# OWASP Reference: OWASP Agentic Application Top 10 (December 2025)
# Machine-readable mapping: schemas/owasp-adam-agt-mapping.json
#
# Version 1.1 | April 2026 — aligned with ADAM book v1.4 (BOSS v3.2 canonical
# Priority Tier weights; non-idempotent penalty = +15 additive; 81+ Agent Mesh)
# ADAM AGT Light Plugin
# ══════════════════════════════════════════════════════════════════════════════

# ── AA01: EXCESSIVE AGENCY ────────────────────────────────────────────────────
# Risk: Agent given too many permissions or capabilities beyond what its task requires
AA01_excessive_agency:
  enabled: true
  enforcement_mode: block               # block | log_only | alert — ADAM default is block

  adam_architectural_controls:
    - component: "BOSS Score v3.2: Sovereignty Action dimension (weight 4.0, Priority Tier: Very High)"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: boss_escalation_tiers"
    - component: "CORE Engine: tools_authorized list per agent vertex"
      plane: "Policy & Risk Plane"
      configuration: "CORE Graph AgentVertex.tools_authorized[] array"
    - component: "Exception Economy: autonomy budgets"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: autonomy_budgets"

  agt_runtime_enforcement:
    agent_os:
      enabled: true
      policy_rules:
        - "deny_tools_outside_authorised_list"    # Rego Rule 3 in agent-os-policy-template.rego
        - "ring_enforcement"                       # Rego Rule 4
      policy_template_ref: "config/agent-os-policy-template.rego"
    agent_runtime:
      enabled: true
      mechanism: "Execution ring privilege containment (Ring 0-3)"
      ring_config_ref: "deployment/agent-ring-assignments.yaml"

  owasp_boss_dimension: sovereignty_action
  owasp_ciso_owner: true               # Security & Trust Governor Agent primary owner

  compensating_controls_if_agt_disabled:
    - "Implement tools_authorized enforcement in agent framework (e.g. LangGraph tool binding)"
    - "Apply Kubernetes RBAC to restrict agent service account permissions"
    - "Monitor BOSS Sovereignty Action dimension for scope anomalies"

# ── AA02: UNRESTRICTED AUTONOMY ───────────────────────────────────────────────
# Risk: Agent permitted to take actions indefinitely without human oversight or stopping conditions
AA02_unrestricted_autonomy:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "BOSS SOAP-to-OHSHAT escalation tiers"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: boss_escalation_tiers"
    - component: "Autonomy budgets: consumable stopping conditions"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: autonomy_budgets"
    - component: "Exception Economy: 15% tolerance window"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: exception_economy.tolerance_window_pct"
    - component: "5-Director Constitution: Director approval at HIGH tier"
      plane: "Governance Plane"
      configuration: "deployment/exception-economy-config.yaml: director_interfaces"

  agt_runtime_enforcement:
    agent_os:
      enabled: true
      policy_rules:
        - "boss_score_gate"           # Rego Rule 1 — OHSHAT block
        - "boss_autonomous_gate"      # Rego Rule 2 — SOAP autonomous gate
      policy_template_ref: "config/agent-os-policy-template.rego"
    agent_runtime:
      enabled: true
      mechanism: "Kill switch — OHSHAT-tier emergency shutdown"
      ohshat_boss_threshold: 76
    agent_sre:
      enabled: true
      mechanism: "Error budget circuit breakers enforce operational stopping conditions"
      slo_config_ref: "deployment/agent-slo-config.yaml"

  owasp_boss_dimension: sovereignty_action
  two_dimensional_trust_note: "Agent trust score < 700 increases BOSS Security Impact, raising the effective BOSS tier. A low-trust agent reaches autonomy constraints faster."

# ── AA03: GOAL HIJACKING ──────────────────────────────────────────────────────
# Risk: Malicious content in agent's context manipulates agent to pursue attacker's goals
AA03_goal_hijacking:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "CORE Engine: intent validation against doctrine graph before execution"
      plane: "Policy & Risk Plane"
      configuration: "CORE Engine Rego export includes hard_rule_protected_actions"
    - component: "BOSS Doctrinal Alignment dimension (weight 2.0, Priority Tier: Medium)"
      plane: "Policy & Risk Plane"
      configuration: "Doctrinal alignment score captured in every Flight Recorder event"
    - component: "Separation of intelligence from execution capability"
      plane: "Security & Trust Plane"
      configuration: "Agents cannot self-modify tools_authorized list or ring assignment"

  agt_runtime_enforcement:
    agent_os:
      enabled: true
      policy_rules:
        - "doctrine_alignment_check"  # Rego Rule 5 — hard rule protection
        - "intent_deviation_detection" # Rego Rule 6 — semantic intent deviation
      semantic_intent_classifier: true
      policy_template_ref: "config/agent-os-policy-template.rego"
      intent_classification_threshold: 0.7  # Score below 0.7 triggers intent deviation alert

  owasp_boss_dimension: doctrinal_alignment

  compensating_controls_if_agt_disabled:
    - "Implement intent validation layer in agent orchestration framework"
    - "Apply strict system-prompt isolation and input sanitization"
    - "Monitor BOSS Doctrinal Alignment dimension for semantic drift"
    - "Flight Recorder captures all intent deviations — mandatory without Agent OS"

# ── AA04: TOOL MISUSE ─────────────────────────────────────────────────────────
# Risk: Agent uses available tools in unintended ways or invokes unauthorized tools
AA04_tool_misuse:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "Cryptographic Authorization Vault: high-risk tool authorizations"
      plane: "Interoperability Plane"
      configuration: "Smart-contract governed tool invocation grants"
    - component: "MCP-Ready Control Surfaces: signed tool contracts"
      plane: "Interoperability Plane"
      configuration: "MCP v2 tool invocation contracts with agent-scoped authorization"
    - component: "CORE Engine tools_authorized per agent vertex"
      plane: "Policy & Risk Plane"
      configuration: "AgentVertex.tools_authorized[] — per-agent, per-context whitelist"

  agt_runtime_enforcement:
    agent_os:
      enabled: true
      policy_rules:
        - "tool_authorisation_check"  # Rego Rule 3
      policy_template_ref: "config/agent-os-policy-template.rego"
    agent_marketplace:
      enabled: true
      mechanism: "Ed25519 manifest verification before any tool invocation"
      require_signed_manifests: true
      unsigned_tool_block: true      # Not just log — BLOCKED

  owasp_boss_dimension: security_impact

# ── AA05: IDENTITY AND ACCESS COMPROMISE ──────────────────────────────────────
# Risk: Agent identity spoofed or access controls bypassed
AA05_identity_access:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "Security & Trust Plane: verifiable identity requirement"
      plane: "Security & Trust Plane"
      configuration: "No anonymous execution in the 81+ Agent Mesh"
    - component: "Scoped permissions per agent: CORE Graph Agent vertex authority scope"
      plane: "Security & Trust Plane"
      configuration: "AgentVertex.authority_scope in CORE Graph"
    - component: "mTLS between all agent pods via Istio"
      plane: "Security & Trust Plane"
      configuration: "Istio service mesh with PeerAuthentication policy: STRICT"

  agt_runtime_enforcement:
    agent_mesh:
      enabled: true
      mechanism: "W3C DID identity (Ed25519) per agent — non-forgeable. IATP trust verification on every interaction."
      did_method: "did:azure"
      revocation_registry_enabled: true
      continuous_trust_reevaluation: true    # Per-interaction trust check

  owasp_boss_dimension: security_impact
  identity_failure_boss_adjustment: +25     # Trust score below 100 triggers +25 BOSS security_impact

# ── AA06: UNCONTROLLED DELEGATION ────────────────────────────────────────────
# Risk: Agent delegates authority to other agents without proper authorization checks
AA06_uncontrolled_delegation:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "Governor Agent approval gates for cross-domain delegation"
      plane: "Security & Trust Plane"
      configuration: "Governor Agent A2A escalation_request protocol"
    - component: "Cryptographic Authorization Vault: delegation as smart-contract grants"
      plane: "Security & Trust Plane"
      configuration: "Delegation grants stored with scope constraints"
    - component: "A2A Protocol: delegation messages carry cryptographic authorization proof"
      plane: "Agent Mesh & Orchestration Fabric"
      configuration: "A2A message envelope includes governor_approval_token"

  agt_runtime_enforcement:
    agent_mesh:
      enabled: true
      mechanism: "IATP trust chain validation — delegation to low-trust agents blocked"
      delegation_trust_threshold: 300   # Probationary threshold — delegation blocked below this
    agent_os:
      enabled: true
      policy_rules:
        - "doctrine_alignment_check"  # Governor authorization token check (Rego Rule 5)

  owasp_boss_dimension: sovereignty_action

# ── AA07: INSUFFICIENT MONITORING AND LOGGING ─────────────────────────────────
# Risk: Insufficient visibility into agent actions preventing anomaly detection
AA07_insufficient_monitoring:
  enabled: true
  enforcement_mode: block               # block = deny execution if Flight Recorder is unavailable

  adam_architectural_controls:
    - component: "Flight Recorder: hash-chained, tamper-evident, cryptographically signed"
      plane: "Evidence & Audit Plane"
      configuration: "deployment/agt-light-helm-values.yaml: rgiAdapter configuration"
    - component: "7-year WORM retention with Azure Confidential Ledger anchoring"
      plane: "Evidence & Audit Plane"
      configuration: "Deployment Specification Section 6.2: Flight Recorder Infrastructure"
    - component: "Self-Audit Agent: continuous evidence chain integrity validation"
      plane: "Meta-Governance Layer"
      configuration: "Self-Audit Agent job schedule (Ring 0)"

  agt_runtime_enforcement:
    agent_sre:
      enabled: true
      mechanism: "Quantitative SLO monitoring, error budgets, circuit breakers for agent mesh"
      slo_config_ref: "deployment/agent-slo-config.yaml"
    rgi_adapter:
      enabled: true
      mechanism: "Bridges all AGT OpenTelemetry spans to Flight Recorder evidence format"
      flight_recorder_unavailable_action: "deny_new_execution"   # Fail-closed if FR unavailable

  owasp_boss_dimension: security_impact

  monitoring_completeness_requirements:
    every_action_logged: true
    boss_score_captured_per_event: true
    agt_context_block_required: true         # agt_context in flight-recorder-event-v2.json
    chain_hash_integrity: true
    hsm_signature_required: true

# ── AA08: SUPPLY CHAIN VULNERABILITIES ────────────────────────────────────────
# Risk: Malicious or compromised tools, models, or plugins introduced
AA08_supply_chain:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "MCP-Ready Control Surfaces: signed tool contracts"
      plane: "Interoperability Plane"
      configuration: "MCP v2 tool invocation contracts"
    - component: "Cryptographic Authorization Vault: external tool authorization"
      plane: "Interoperability Plane"
      configuration: "Vault-governed grants for external tool access"
    - component: "CORE Engine tools_authorized whitelist"
      plane: "Policy & Risk Plane"
      configuration: "AgentVertex.tools_authorized[]"

  agt_runtime_enforcement:
    agent_marketplace:
      enabled: true
      mechanism: "Ed25519 manifest signing. Revocation checked hourly, real-time on BOSS HIGH+"
      require_signed_manifests: true
      unsigned_tool_block: true
      real_time_revocation_on_boss_high: true   # BOSS score >= 51 triggers real-time check
      revocation_check_interval: "1h"

  owasp_boss_dimension: rights_certainty

  trusted_publisher_key_management:
    keys_stored_in: "agt-light-helm-values.yaml: agentMarketplace.trustedPublisherKeys"
    minimum_keys_required: 1
    key_rotation_required: true
    rotation_interval_days: 365

# ── AA09: OPERATIONAL DISRUPTION ─────────────────────────────────────────────
# Risk: Agent actions cause unintended disruptions to production systems
AA09_operational_disruption:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "Stability & Drift Plane: continuous operational deviation monitoring"
      plane: "Stability & Drift Plane"
      configuration: "Autonomy Stability Agent + ADX time-series BOSS Score trends"
    - component: "Operational Continuity Agent: service continuity under failure"
      plane: "Stability & Drift Plane"
      configuration: "Operational Continuity Agent (Work Group, Ring 3)"
    - component: "Exception Economy: non-idempotent action penalties (+15 additive to composite)"
      plane: "Policy & Risk Plane"
      configuration: "deployment/exception-economy-config.yaml: non_idempotent_penalty (additive_flat, value 15)"

  agt_runtime_enforcement:
    agent_sre:
      enabled: true
      mechanism: "Circuit breakers trip on downstream degradation; error budgets enforce stopping conditions"
      slo_config_ref: "deployment/agent-slo-config.yaml"
    agent_runtime:
      enabled: true
      mechanism: "Saga orchestration wraps all operations with compensating transactions for rollback"
      saga_compensation_timeout: "5m"
      saga_max_retries: 3

  owasp_boss_dimension: security_impact        # Operational disruption = availability impact = security_impact
  boss_dimension_rationale: "Operational disruption attacks system availability (CIA triad A). DORA operational resilience requirements are captured in BOSS Regulatory Impact dimension separately. The primary BOSS signal is security_impact."

  chaos_engineering_posture:
    pre_production_validation: required        # Chaos must validate assumptions before production
    director_authorization_required: true      # CISO signature required per experiment
    blast_radius: "maximum 3 work-group agents per experiment"

# ── AA10: MISALIGNMENT AND TRUST EROSION ─────────────────────────────────────
# Risk: Agent behavior gradually drifts from intended objectives
AA10_misalignment:
  enabled: true
  enforcement_mode: block

  adam_architectural_controls:
    - component: "CORE Engine drift detection: DriftRecord vertices track doctrine divergence"
      plane: "Stability & Drift Plane"
      configuration: "CORE Graph DriftRecord vertices, queried by Autonomy Stability Agent"
    - component: "Autonomy Stability Agent: continuous alignment scoring"
      plane: "Meta-Governance Layer"
      configuration: "Autonomy Stability Agent (Ring 0, reports to all Directors)"
    - component: "BOSS Doctrinal Alignment dimension (weight 2.0, Priority Tier: Medium)"
      plane: "Policy & Risk Plane"
      configuration: "Every action scored against doctrine; accumulated drift triggers review"

  agt_runtime_enforcement:
    agent_lightning:
      enabled: false                           # Optional — only for RL-trained deployments
      when_to_enable: "Enable only if deployment includes RL-trained agents"
      rl_boundary_policy: "strict"
      runaway_optimization_threshold: 0.15     # 15% reward signal divergence triggers halt

  owasp_boss_dimension: doctrinal_alignment

  drift_detection_configuration:
    drift_score_boss_threshold: 20            # BOSS Doctrinal Alignment raw_score >= 20 triggers ELEVATED review
    accumulated_drift_window_days: 7
    accumulated_drift_actions_threshold: 3    # 3 drift events in 7 days triggers Governor Agent review
    doctrine_version_change_notification: all_directors   # All Directors notified on doctrine version increment

# ── POSTURE SUMMARY ───────────────────────────────────────────────────────────
# Machine-readable summary of enforcement posture across all 10 risks.
posture_summary:
  overall_posture: "defense_in_depth"          # ADAM architecture + AGT runtime = layered coverage
  all_risks_addressed: true
  enforcement_mode_default: "block"            # Fail-closed is ADAM default — never log_only in production

  coverage_by_layer:
    architecture_only:    []                   # No risks covered by architecture alone
    runtime_only:         []                   # No risks covered by runtime alone
    architecture_plus_runtime:
      - AA01  # Excessive Agency
      - AA02  # Unrestricted Autonomy
      - AA03  # Goal Hijacking
      - AA04  # Tool Misuse
      - AA05  # Identity and Access Compromise
      - AA06  # Uncontrolled Delegation
      - AA07  # Insufficient Monitoring
      - AA08  # Supply Chain Vulnerabilities
      - AA09  # Operational Disruption
      - AA10  # Misalignment and Trust Erosion

  boss_dimension_coverage:
    sovereignty_action:   [AA01, AA02, AA06]
    security_impact:      [AA04, AA05, AA07, AA09]
    rights_certainty:     [AA08]
    doctrinal_alignment:  [AA03, AA10]
    regulatory_impact:    []                   # No OWASP risks map directly to regulatory_impact
    financial_exposure:   []                   # No OWASP risks map directly to financial_exposure
    reputational_risk:    []                   # No OWASP risks map directly to reputational_risk
    note: "BOSS Financial Exposure and Reputational Risk are ADAM governance dimensions not directly covered by OWASP AA01-AA10. They are addressed by the Exception Economy and Director Constitution independently."
