# ══════════════════════════════════════════════════════════════════════════════
# ADAM AGT Light — Agent SRE SLO Configuration
# Runtime Governance Interface — RGI-04: Telemetry Emission
# ══════════════════════════════════════════════════════════════════════════════
# This file defines Service Level Objectives (SLOs), error budgets, and circuit
# breaker thresholds for each ADAM agent class. It is consumed by AGT Agent SRE
# and referenced by the Helm chart via sloConfigMapRef: "adam-agent-slos".
#
# Deployment: Create Kubernetes ConfigMap from this file:
#   kubectl create configmap adam-agent-slos \
#     --from-file=agent-slo-config.yaml \
#     --namespace adam-agt
#
# Version 1.1 | April 2026 | Aligned with ADAM book v1.4 (BOSS v3.2; 81+ Agent
# Mesh reference count 81 across seven canonical classes; canonical Governor
# Agent roster: Financial, Legal & Compliance, Security & Trust, Market &
# Ecosystem, Operations & Delivery)
# Reference: ADAM AGT Light Integration Plugin, Part 4.4 (Stability & Drift SRE)
# ══════════════════════════════════════════════════════════════════════════════

# ── GLOBAL SRE CONFIGURATION ──────────────────────────────────────────────────
global:
  error_budget_window_days: 30         # Rolling window for error budget consumption
  slo_evaluation_interval: "15s"       # How often Agent SRE evaluates SLOs
  circuit_breaker_open_duration: "30s" # Default open-state duration before half-open probe
  prometheus_namespace: "adam_agent"   # Prometheus metric namespace prefix

# ── AGENT CLASS SLOs ──────────────────────────────────────────────────────────
# One SLO set per ADAM agent class. Higher-authority agents (lower ring number)
# have stricter SLOs because their failures propagate further.

agent_class_slos:

  # ── META-GOVERNANCE (Ring 0) ──────────────────────────────────────────────
  meta_governance:
    ring: 0
    examples:
      - "Self-Audit Agent"
      - "Doctrine Versioning Agent"
      - "Schema Registry Agent"
    description: "Highest-authority agents. Doctrine write and policy publish capability."

    slos:
      availability:
        target_pct: 99.99             # Four nines — doctrine write must never be unavailable
        window: "30d"
        error_budget_minutes_per_month: 4.3
        burn_rate_alert_threshold_1h: 14.4   # 14.4x = burning 30d budget in 1h
        burn_rate_alert_threshold_6h: 6.0

      action_evaluation_latency:
        target_p99_ms: 200            # End-to-end intent evaluation at Ring 0
        target_p50_ms: 50
        window: "30d"
        boss_tier_context: "Only OHSHAT-tier actions reach Ring 0 programmatically"

      policy_evaluation_latency:      # Agent OS SLA for Ring 0 policy evaluation
        target_p99_ms: 0.1            # Agent OS SLA — non-negotiable
        target_p50_ms: 0.05
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 10      # Ring 0 circuit breaker is very sensitive
      window_seconds: 30
      open_duration_seconds: 60
      half_open_probes: 1            # Single probe before reset
      on_open_action: "notify_all_directors_immediate"

    error_budget_exhaustion_action:
      - "halt_ring0_actions"
      - "notify_ciso_immediate"
      - "escalate_to_ohshat_protocol"

  # ── GOVERNOR AGENTS (Ring 1) ──────────────────────────────────────────────
  governor_agent:
    ring: 1
    examples:
      - "Financial Governor Agent"
      - "Legal & Compliance Governor Agent"
      - "Security & Trust Governor Agent"
      - "Market & Ecosystem Governor Agent"
      - "Operations & Delivery Governor Agent"
    description: "Domain governance authority. Exception adjudication and escalation."

    slos:
      availability:
        target_pct: 99.95
        window: "30d"
        error_budget_minutes_per_month: 21.6
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      exception_adjudication_latency:
        target_p99_ms: 15000         # 15 seconds — Governor review within SLA
        target_p50_ms: 3000          # Median < 3 seconds
        governor_review_timeout_minutes: 15   # Aligns with exception-economy-config.yaml
        boss_tier_context: "ELEVATED tier (31-50) triggers Governor Agent review"

      cross_domain_delegation_latency:
        target_p99_ms: 5000
        target_p50_ms: 1000

      policy_evaluation_latency:
        target_p99_ms: 0.1
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 20
      window_seconds: 60
      open_duration_seconds: 30
      half_open_probes: 2
      on_open_action: "escalate_exception_to_relevant_director"
      director_escalation_map:       # Which Director to notify per Governor Agent domain
        financial_governor_agent: cfo_director
        legal_compliance_governor_agent: legal_director
        security_trust_governor_agent: ciso_director
        market_ecosystem_governor_agent: market_director
        operations_delivery_governor_agent: ceo_director

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "notify_relevant_director"
      - "activate_enhanced_logging"

  # ── ORCHESTRATION (Ring 2) ────────────────────────────────────────────────
  orchestration:
    ring: 2
    examples:
      - "Enterprise Orchestration Agent"
      - "Resource & Capacity Orchestration Agent"
      - "Cross-Domain Orchestration Agent"
      - "Temporal Orchestration Agent"
    description: "Multi-agent task coordination. Cannot write doctrine or adjudicate exceptions."

    slos:
      availability:
        target_pct: 99.9
        window: "30d"
        error_budget_minutes_per_month: 43.2
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      orchestration_latency:         # Time to decompose intent into work group tasks
        target_p99_ms: 2000
        target_p50_ms: 500
        boss_tier_context: "MODERATE tier (11-30) triggers enhanced logging for orchestration"

      task_handoff_latency:
        target_p99_ms: 500           # A2A message delivery latency
        target_p50_ms: 100

      policy_evaluation_latency:
        target_p99_ms: 0.1
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 30
      window_seconds: 60
      open_duration_seconds: 30
      half_open_probes: 3
      on_open_action: "notify_governor_agent_domain"

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "activate_enhanced_logging"
      - "notify_operations_governor_agent"

  # ── HUMAN INTERFACE (Ring 2) ──────────────────────────────────────────────
  human_interface:
    ring: 2
    examples:
      - "Intent-to-Action Agent"
      - "Director Interface Agent"
      - "Stakeholder Reporting Agent"
    description: "Human-to-agent and Director interface. Translates Intent Objects into orchestration instructions."

    slos:
      availability:
        target_pct: 99.9
        window: "30d"
        error_budget_minutes_per_month: 43.2
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      intent_parsing_latency:        # Time to parse human input into Intent Object
        target_p99_ms: 3000
        target_p50_ms: 800
        note: "Includes LLM inference time — budget per Intent-to-Action Agent LLM assignment"

      director_interface_latency:
        target_p99_ms: 1000          # Director dashboard response SLA
        target_p50_ms: 250

      policy_evaluation_latency:
        target_p99_ms: 0.1
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 25
      window_seconds: 60
      open_duration_seconds: 30
      half_open_probes: 3
      on_open_action: "notify_operations_governor_agent"

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "notify_operations_governor_agent"

  # ── DIGITAL TWIN (Ring 2) ─────────────────────────────────────────────────
  digital_twin:
    ring: 2
    examples:
      - "Operational Twin Agent"
      - "Risk & Compliance Twin Agent"
      - "Economic Twin Agent"
      - "AI Creativity Twin"
    description: "Simulation and scenario modelling. Read-intensive; no execution authority over live systems."

    slos:
      availability:
        target_pct: 99.5            # Digital twins tolerate brief unavailability
        window: "30d"
        error_budget_minutes_per_month: 216
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      simulation_latency:
        target_p99_ms: 10000        # Scenario simulations may take up to 10 seconds p99
        target_p50_ms: 2000

      policy_evaluation_latency:
        target_p99_ms: 0.1
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 40
      window_seconds: 120
      open_duration_seconds: 60
      half_open_probes: 3
      on_open_action: "log_and_notify_operations_governor_agent"

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "log_enhanced"

  # ── WORK GROUP (Ring 3) ───────────────────────────────────────────────────
  work_group:
    ring: 3
    description: "All 39 Corporate Work Group agents. Task execution with tools_authorized list enforcement."
    note: >
      Individual work group agents may have domain-specific SLO overrides.
      These defaults apply to all Corporate Work Group agents unless overridden by
      a domain_specific_overrides entry below. The AI-Centric Division (23 agents)
      shares Ring 3 but has its own SLO block below.

    slos:
      availability:
        target_pct: 99.5
        window: "30d"
        error_budget_minutes_per_month: 216
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      task_execution_latency:
        target_p99_ms: 30000        # Task execution can take up to 30 seconds p99
        target_p50_ms: 5000
        boss_tier_context: "SOAP tier (0-10) is expected for most work group actions"

      tool_invocation_latency:
        target_p99_ms: 5000         # External tool calls have variable latency
        target_p50_ms: 1000

      policy_evaluation_latency:
        target_p99_ms: 0.1          # Agent OS policy evaluation SLA — same for all rings
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 50
      window_seconds: 60
      open_duration_seconds: 30
      half_open_probes: 3
      on_open_action: "notify_domain_governor_agent"

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "notify_domain_governor_agent"
      - "activate_enhanced_logging"

  # ── AI-CENTRIC DIVISION (Ring 3) ──────────────────────────────────────────
  ai_centric_division:
    ring: 3
    examples:
      - "AI Strategy Agent"
      - "AI Product Agent"
      - "AI Research Agent"
      - "AI Platform Agent"
      - "AI Ethics Agent"
    description: >
      All 23 AI-Centric Division agents. Same execution ring as Corporate Work
      Group but distinct agent class; domain scope is AI strategy, AI product
      delivery, AI research, and AI ethics/alignment reviews.

    slos:
      availability:
        target_pct: 99.5
        window: "30d"
        error_budget_minutes_per_month: 216
        burn_rate_alert_threshold_1h: 14.4
        burn_rate_alert_threshold_6h: 6.0

      task_execution_latency:
        target_p99_ms: 30000
        target_p50_ms: 5000
        boss_tier_context: "SOAP tier (0-10) is expected for most AI-Centric Division actions"

      tool_invocation_latency:
        target_p99_ms: 5000
        target_p50_ms: 1000

      policy_evaluation_latency:
        target_p99_ms: 0.1
        boss_integration: true

    circuit_breaker:
      failure_threshold_pct: 50
      window_seconds: 60
      open_duration_seconds: 30
      half_open_probes: 3
      on_open_action: "notify_operations_governor_agent"

    error_budget_exhaustion_action:
      - "constrain_hpa"
      - "notify_operations_governor_agent"
      - "activate_enhanced_logging"

# ── DOMAIN-SPECIFIC SLO OVERRIDES ────────────────────────────────────────────
# Override defaults for specific high-criticality work group agents.
# Pattern: agent_id must match the agent_id in the CORE Graph Agent vertex.
domain_specific_overrides:

  financial_commitment_agents:
    agent_ids:
      - "financial-commitment-agent-01"
      - "purchase-order-agent-01"
      - "vendor-payment-agent-01"
    override_slos:
      availability:
        target_pct: 99.9            # Financial commitment agents held to higher availability
      task_execution_latency:
        target_p99_ms: 10000        # Tighter latency — financial actions are time-sensitive
    circuit_breaker:
      failure_threshold_pct: 20     # More sensitive circuit breaker for financial agents
      on_open_action: "notify_cfo_director_immediate"

  compliance_classification_agents:
    agent_ids:
      - "regulatory-filing-agent-01"
      - "audit-evidence-agent-01"
    override_slos:
      availability:
        target_pct: 99.9
    circuit_breaker:
      failure_threshold_pct: 20
      on_open_action: "notify_legal_director_immediate"

# ── AGT AGENT SRE SPECIFIC SETTINGS ──────────────────────────────────────────
# These settings configure AGT Agent SRE behaviour specific to ADAM integration.
agt_sre_integration:

  # Circuit breaker state must be emitted to Flight Recorder
  flight_recorder_events:
    emit_circuit_breaker_state_changes: true  # RGI-04 requirement
    emit_slo_violation_events: true
    emit_error_budget_burn_events: true
    emit_chaos_experiment_results: true       # When chaos is authorized

  # BOSS Score integration
  boss_integration:
    slo_violation_boss_adjustment: +5         # BOSS Security Impact +5 on SLO violation
    circuit_breaker_open_boss_adjustment: +10 # BOSS Security Impact +10 when circuit opens
    error_budget_exhaustion_boss_adjustment: +15  # BOSS Security Impact +15 on budget exhaustion
    boss_dimension: security_impact

  # Chaos engineering authorization (must match agt-light-helm-values.yaml)
  chaos_engineering:
    enabled: false                            # Disabled by default — requires Director authorization
    pre_authorization_required:
      - ciso_director_signed_approval
      - intent_object_with_chaos_scope
    blast_radius_limits:
      max_agents_per_experiment: 3
      max_agent_class: "work_group"           # Never chaos ring 0 or 1 agents
      production_environment: false           # Never run chaos in production without CISO approval

# ── GLOBAL BOSS METRIC EXPORT ─────────────────────────────────────────────────
# Prometheus metrics exported by Agent SRE for ADAM monitoring dashboards
prometheus_metrics:
  - name: "adam_agent_boss_score_composite"
    type: gauge
    labels: ["agent_id", "agent_class", "intent_id", "routing_decision"]
    description: "Current BOSS composite score for the most recent action by this agent"

  - name: "adam_agent_trust_score"
    type: gauge
    labels: ["agent_id", "agent_class", "execution_ring", "trust_tier"]
    description: "Current AGT Agent Mesh IATP trust score for this agent"

  - name: "adam_agent_ring_violations_total"
    type: counter
    labels: ["agent_id", "agent_class", "attempted_ring"]
    description: "Total cross-ring escalation violation attempts. Should always be 0."

  - name: "adam_exception_economy_budget_remaining_pct"
    type: gauge
    labels: ["budget_dimension", "director_owner"]
    description: "Remaining autonomy budget as percentage of configured cap"

  - name: "adam_circuit_breaker_state"
    type: gauge
    labels: ["agent_class", "agent_id"]
    description: "Current circuit breaker state: 0=closed, 1=half-open, 2=open"

  - name: "adam_boss_routing_decisions_total"
    type: counter
    labels: ["routing_decision", "agent_class", "action_type"]
    description: "Total routing decisions by tier. routing_decision enum: autonomous|constrained|elevated|high|ohshat"
