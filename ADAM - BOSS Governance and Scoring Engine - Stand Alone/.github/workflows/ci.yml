name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-typecheck:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[lint,test,adapters,metrics]'
      - name: ruff check
        run: ruff check boss_core boss_api boss_graph boss_adapters examples scripts tests
      - name: ruff format --check
        run: ruff format --check boss_core boss_api boss_graph boss_adapters examples scripts tests
      - name: mypy (strict)
        run: mypy boss_core boss_api boss_graph boss_adapters

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e '.[test,adapters,metrics]'
      - name: pytest
        run: |
          mkdir -p .reports
          pytest -m "not integration and not schemathesis" \
                 --junitxml=.reports/junit-unit.xml \
                 --cov --cov-report=xml:.reports/coverage.xml \
                 --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-reports-py${{ matrix.python }}
          path: .reports

  schemathesis:
    name: schemathesis (OpenAPI fuzz)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[test]'
      - name: Start API in background
        run: |
          uvicorn boss_api.app:create_app --factory --host 127.0.0.1 --port 8080 &
          echo $! > uvicorn.pid
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/v1/health && break || sleep 1
          done
      - name: schemathesis run
        env:
          BOSS_API_URL: http://127.0.0.1:8080
        run: |
          mkdir -p .reports
          schemathesis run http://127.0.0.1:8080/v1/openapi.json \
              --checks all --workers 2 --show-errors-tracebacks \
              --hypothesis-max-examples=25 \
              --junit-xml .reports/junit-schemathesis.xml
      - name: Stop API
        if: always()
        run: test -f uvicorn.pid && kill "$(cat uvicorn.pid)" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schemathesis-reports
          path: .reports

  security:
    name: bandit + pip-audit + trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit[toml] pip-audit
      - run: bandit -r boss_core boss_api boss_graph boss_adapters -c pyproject.toml -f sarif -o bandit.sarif
      - run: pip install -e '.' && pip-audit --strict || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  console:
    name: console (npm build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boss_console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: boss_console/package-lock.json
      - run: npm ci --no-audit --no-progress
        if: ${{ hashFiles('boss_console/package-lock.json') != '' }}
      - run: npm install --no-audit --no-progress
        if: ${{ hashFiles('boss_console/package-lock.json') == '' }}
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: boss_console/dist

  helm:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.4"
      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - run: helm lint deploy/helm/boss-engine
      - run: helm template boss-engine deploy/helm/boss-engine | kubeconform -strict -summary -kubernetes-version 1.30.0
      - name: Validate raw manifests
        run: kubeconform -strict -summary -kubernetes-version 1.30.0 -ignore-missing-schemas deploy/k8s/*.yaml

  docker:
    name: docker build + trivy image scan
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, console]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: boss-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'boss-engine:ci'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy-image.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
