{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "boss-engine.fullname" . }}-neo4j-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: graph
type: Opaque
stringData:
  NEO4J_AUTH: {{ printf "neo4j/%s" (required "neo4j.password required when neo4j.enabled=true" .Values.neo4j.password) | quote }}
  BOSS_NEO4J_PASSWORD: {{ .Values.neo4j.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "boss-engine.fullname" . }}-neo4j
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: graph
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "boss-engine.fullname" . }}-neo4j
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: graph
spec:
  serviceName: {{ include "boss-engine.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: adam
        app.kubernetes.io/component: graph
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: {{ .Values.neo4j.image | quote }}
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "boss-engine.fullname" . }}-neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "1G"
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.dataSize }}
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.logsSize }}
{{- end }}
