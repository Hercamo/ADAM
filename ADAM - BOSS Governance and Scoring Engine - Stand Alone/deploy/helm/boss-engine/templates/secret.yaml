{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "boss-engine.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  BOSS_JWT_SECRET: {{ required "auth.jwtSecret is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.jwtSecret | quote }}
  BOSS_ADMIN_TOKENS: {{ required "auth.adminTokens is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.adminTokens | quote }}
  {{- if and .Values.external.neo4j.uri (not .Values.external.neo4j.existingSecret) }}
  BOSS_NEO4J_PASSWORD: {{ required "external.neo4j password required when external.neo4j.uri is set" .Values.external.neo4j.password | default "" | quote }}
  {{- end }}
{{- end }}
