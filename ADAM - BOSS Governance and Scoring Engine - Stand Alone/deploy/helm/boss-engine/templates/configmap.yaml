apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "boss-engine.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ tpl (printf "%v" $value) $ | quote }}
  {{- end }}
  {{- if .Values.external.neo4j.uri }}
  BOSS_NEO4J_URI: {{ .Values.external.neo4j.uri | quote }}
  BOSS_NEO4J_USER: {{ .Values.external.neo4j.user | quote }}
  BOSS_NEO4J_DATABASE: {{ .Values.external.neo4j.database | quote }}
  {{- else if .Values.neo4j.enabled }}
  BOSS_NEO4J_URI: {{ printf "bolt://%s-neo4j:7687" (include "boss-engine.fullname" .) | quote }}
  BOSS_NEO4J_USER: "neo4j"
  BOSS_NEO4J_DATABASE: "boss"
  {{- end }}
