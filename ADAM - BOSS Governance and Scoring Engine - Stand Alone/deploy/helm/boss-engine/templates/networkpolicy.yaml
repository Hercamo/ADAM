{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "boss-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boss-engine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "boss-engine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedCallerNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .name | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if or .Values.neo4j.enabled .Values.external.neo4j.uri }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: neo4j
              app.kubernetes.io/part-of: adam
      ports:
        - protocol: TCP
          port: 7687
    {{- end }}
{{- end }}
