---
# EXAMPLE Secret — replace the stringData values before applying, or
# generate from a secret manager (Vault Agent, External Secrets Operator,
# AWS Secrets Manager CSI driver, etc.). The values below are placeholders
# and intentionally will NOT work against a real engine.
apiVersion: v1
kind: Secret
metadata:
  name: boss-engine-secrets
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: boss-engine
    app.kubernetes.io/part-of: adam
type: Opaque
stringData:
  # 32+ byte random value used to sign short-lived admin tokens. Rotate on
  # every release.
  BOSS_JWT_SECRET: "REPLACE-ME-WITH-A-32-BYTE-RANDOM-SECRET"
  # Comma-separated admin tokens (bootstrap only, rotate to OIDC ASAP).
  BOSS_ADMIN_TOKENS: "REPLACE-ME-WITH-A-LONG-RANDOM-STRING"
  # Neo4j connection. Leave BOSS_NEO4J_URI blank to run with the
  # in-memory graph on pod startup.
  BOSS_NEO4J_URI: "bolt+s://neo4j.boss-engine.svc.cluster.local:7687"
  BOSS_NEO4J_USER: "boss-engine"
  BOSS_NEO4J_PASSWORD: "REPLACE-ME-WITH-A-NEO4J-PASSWORD"
