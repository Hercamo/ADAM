---
# Dedicated, non-privileged ServiceAccount used by the engine pods.
# No cluster-level RBAC is required — the engine does not speak to the Kube
# API at runtime. If you later enable OIDC-based workload identity, attach
# the required annotations to this ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: boss-engine
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: boss-engine
    app.kubernetes.io/part-of: adam
automountServiceAccountToken: false
