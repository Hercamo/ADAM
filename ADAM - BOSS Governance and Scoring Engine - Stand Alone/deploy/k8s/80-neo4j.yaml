---
# Optional Neo4j backend for the BOSS data graph.
#
# For production you almost certainly want the Neo4j Helm chart or a
# managed Aura instance. This manifest is the minimal, self-contained
# baseline used by the BOSS Engine smoke tests and by the ADAM
# Sovereignty Connector on k3d.
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: adam
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph
    app.kubernetes.io/part-of: adam
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
      app.kubernetes.io/component: graph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/component: graph
        app.kubernetes.io/part-of: adam
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: neo4j:5.23-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "1G"
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Example only — generate and apply the real Secret separately.
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: adam
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/REPLACE-ME-WITH-A-NEO4J-PASSWORD"
