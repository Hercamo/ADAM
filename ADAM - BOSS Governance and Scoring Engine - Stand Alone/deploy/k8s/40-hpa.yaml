---
# Horizontal Pod Autoscaler for the engine API. Tuned to scale on CPU
# first with a fallback on P95 latency if you have a custom metrics API.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: boss-engine
  namespace: boss-engine
  labels:
    app.kubernetes.io/name: boss-engine
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: adam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: boss-engine
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
