# ============================================================================
# ADAM-AGT Helm Values for Generic Kubernetes (Cloud-Agnostic) Deployment
# ============================================================================
#
# This values file configures the ADAM-Agent Governance Toolkit (AGT) Plugin
# for deployment on any Kubernetes distribution (EKS, GKE, self-managed, etc.)
# using cloud-agnostic services and open-source components:
#
# - HashiCorp Vault for cryptographic key storage (instead of Azure Key Vault)
# - Prometheus + Grafana for observability (instead of Azure Monitor)
# - Generic persistent volumes (not cloud-specific storage classes)
# - etcd or external database for policy cache (instead of Cosmos DB)
#
# This deployment targets is useful for:
# - Multi-cloud deployments spanning multiple cloud providers
# - On-premises/hybrid Kubernetes clusters
# - Development and testing environments
# - Organizations with existing open-source infrastructure investments

# ============================================================================
# GLOBAL DEPLOYMENT CONFIGURATION
# ============================================================================

global:
  # Deployment environment identifier
  environment: production

  # Kubernetes cluster name
  clusterName: adam-generic-k8s-cluster

  # Image registry for AGT sidecar containers
  registry:
    name: adam-registry.example.com  # Replace with actual registry URL
    imagePullSecrets: generic-acr-credentials
    pullPolicy: IfNotPresent

  # Label selectors for determining which pods get AGT sidecar injection
  podSelector:
    labels:
      governance-injectable: "true"

# ============================================================================
# HASHICORP VAULT CONFIGURATION (Secret Management)
# ============================================================================
# Vault replaces Azure Key Vault for cloud-agnostic key management.
# It provides:
# - Ed25519 keypair storage for Agent Mesh cryptographic identity
# - TLS certificate management
# - Dynamic secret generation (e.g., temporary credentials)
# - Audit logging of all secret access

vault:
  # Enable Vault integration
  enabled: true

  # Vault server address (must be resolvable from cluster)
  # Format: https://vault.example.com:8200 or http://vault.internal:8200
  address: "https://vault.example.com:8200"

  # Kubernetes authentication to Vault
  # Allows pods to authenticate without storing passwords in secrets
  auth:
    # Auth method: "kubernetes" (recommended) or "jwt"
    method: kubernetes

    # Kubernetes auth mount path in Vault
    path: kubernetes

    # Kubernetes cluster name registered in Vault
    clusterName: adam-k8s

  # Vault TLS configuration
  tls:
    # Skip TLS verification for self-signed certificates (not recommended for prod)
    skipVerify: false

    # Path to CA certificate for Vault TLS verification
    caPath: /etc/vault/ca.crt

  # Secrets configuration
  secrets:
    # Ed25519 keypair for Agent Mesh
    agentMesh:
      path: secret/data/adam-agt/mesh-identity
      field: private-key

    # TLS certificates
    tlsCert:
      path: secret/data/adam-agt/tls
      field: cert

    tlsKey:
      path: secret/data/adam-agt/tls
      field: key

    # Policy signing key
    policySigningKey:
      path: secret/data/adam-agt/policy
      field: signing-key

  # Vault agent for automatic secret injection (optional)
  # Injector-based automatic secret rotation
  injector:
    enabled: true
    port: 8100

# ============================================================================
# OPEN-SOURCE MONITORING STACK (Prometheus + Grafana)
# ============================================================================
# Replaces Azure Monitor with open-source observability stack

monitoring:
  prometheus:
    # Enable Prometheus for metrics collection
    enabled: true

    # Prometheus server configuration
    server:
      # Service address for Prometheus
      service: prometheus-server.monitoring.svc.cluster.local
      port: 9090
      scheme: http

      # Persistent volume for metrics storage
      persistence:
        enabled: true
        size: 50Gi
        storageClass: "standard"

      # Retention period for metrics
      retention: 30d

      # Remote storage (optional)
      remoteStorage:
        enabled: false
        # url: "http://remote-storage.example.com"

    # ServiceMonitor for scraping AGT metrics
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s

  grafana:
    # Enable Grafana for visualization
    enabled: true

    # Grafana service configuration
    service:
      type: ClusterIP
      port: 3000

    # Default credentials (CHANGE in production)
    adminUser: admin
    adminPassword: changeme  # Override with --set in production

    # Persistent volume for Grafana data
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "standard"

    # Pre-configured dashboards for ADAM-AGT
    dashboards:
      - name: adam-agt-policy-enforcement
        url: "https://example.com/grafana/dashboards/adam-agt-policy.json"
      - name: adam-agt-mesh-identity
        url: "https://example.com/grafana/dashboards/adam-agt-mesh.json"
      - name: adam-agt-compliance
        url: "https://example.com/grafana/dashboards/adam-agt-compliance.json"

  # Alertmanager for alert routing
  alertmanager:
    enabled: true
    service: alertmanager.monitoring.svc.cluster.local
    port: 9093

    # Alert routes and channels
    routes:
      - match:
          severity: critical
        receiver: pagerduty

      - match:
          severity: warning
        receiver: slack

# ============================================================================
# POLICY DATABASE CONFIGURATION (etcd or External Database)
# ============================================================================
# For generic Kubernetes, use either:
# - Built-in etcd (if using managed Kubernetes with etcd available)
# - External PostgreSQL/MySQL for policy storage
# - In-cluster MongoDB or other NoSQL

policyDatabase:
  # Database type: "etcd", "postgresql", "mysql", "mongodb"
  type: "postgresql"

  # External database connection (for non-etcd)
  external:
    enabled: true

    # Database host
    host: "postgresql.example.com"
    port: 5432

    # Database name for CORE Graph policies
    database: "adam-core-graph"

    # Authentication
    auth:
      username: "adam-agt"
      # Password stored in Vault or Kubernetes Secret
      passwordSecret:
        name: adam-postgres-credentials
        key: password

    # Connection pooling
    poolSize: 10
    maxPoolSize: 50

  # For in-cluster PostgreSQL (if using Helm chart)
  # Uncomment and configure if deploying PostgreSQL in-cluster
  # inCluster:
  #   enabled: true
  #   chart: bitnami/postgresql
  #   persistence:
  #     size: 100Gi
  #     storageClass: "standard"

  # Policy cache settings
  cache:
    ttl: 300  # Cache policy decisions for 5 minutes
    size: 10000  # Number of policy decisions to cache

# ============================================================================
# PERSISTENT STORAGE CONFIGURATION
# ============================================================================
# Uses generic Kubernetes storage classes instead of cloud-specific options

persistence:
  # Storage class for persistent volumes
  # Use "standard" for most cloud providers or "fast" for SSD
  storageClass: "standard"

  # Policy cache persistent volume
  policyCache:
    enabled: true
    size: 20Gi
    mountPath: /var/cache/adam-agt

  # Flight Recorder queue (audit trail)
  flightRecorderQueue:
    enabled: true
    size: 5Gi
    mountPath: /var/queue/adam-agt/flight-recorder

  # RL models persistent volume
  lightningModels:
    enabled: true
    size: 15Gi
    mountPath: /var/lib/adam-agt/lightning

# ============================================================================
# SIDECAR INJECTION CONFIGURATION
# ============================================================================

sidecarInjection:
  enabled: true
  webhookNamespace: adam-agt
  mode: "selective"

  podSelector:
    matchLabels:
      inject-agt-sidecar: "true"

  namespaceSelector:
    matchLabels:
      governance-injectable: "true"

  failurePolicy: "Ignore"
  timeoutSeconds: 30

# ============================================================================
# AGENT OS PACKAGE (Policy Engine)
# ============================================================================

agentOs:
  image:
    repository: adam-registry.example.com/adam-agent-os
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  port: 9001

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9001
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9001
    initialDelaySeconds: 5
    periodSeconds: 5

  volumeMounts:
    - name: policy-config
      mountPath: /etc/adam-agt/policies
      readOnly: true
    - name: core-graph-cache
      mountPath: /var/cache/adam-agt/core-graph
      readOnly: true
    - name: tmp-volume
      mountPath: /tmp

  env:
    - name: POLICY_SYNC_INTERVAL_SECONDS
      value: "30"

    # Database endpoint for policy queries
    - name: POLICY_DATABASE_HOST
      value: "postgresql.example.com"

    - name: POLICY_DATABASE_PORT
      value: "5432"

    - name: POLICY_MODE
      value: "strict"

    - name: LOG_LEVEL
      value: "info"

# ============================================================================
# AGENT MESH PACKAGE (Cryptographic Identity & Zero-Trust Networking)
# ============================================================================

agentMesh:
  image:
    repository: adam-registry.example.com/adam-agent-mesh
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 800m
      memory: 512Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  port: 9002
  mtlsProxyPort: 8443

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9002
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9002
    initialDelaySeconds: 5
    periodSeconds: 5

  volumeMounts:
    # Ed25519 keypair from Vault (via Vault Agent injector)
    - name: agt-identity-keys
      mountPath: /etc/adam-agt/identity/keys
      readOnly: true

    # mTLS certificates
    - name: agt-mesh-tls
      mountPath: /etc/adam-agt/mesh/tls
      readOnly: true

    - name: tmp-volume
      mountPath: /tmp

  env:
    - name: VAULT_ADDR
      value: "https://vault.example.com:8200"

    - name: VAULT_SKIP_VERIFY
      value: "false"

    - name: KEY_ROTATION_INTERVAL_SECONDS
      value: "3600"

    - name: ZERO_TRUST_MODE
      value: "strict"

    - name: LOG_LEVEL
      value: "info"

# ============================================================================
# AGENT RUNTIME PACKAGE (Execution Ring Enforcement)
# ============================================================================

agentRuntime:
  image:
    repository: adam-registry.example.com/adam-agent-runtime
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    allowPrivilegeEscalation: true
    readOnlyRootFilesystem: false
    capabilities:
      add:
        - SYS_ADMIN
        - SYS_PTRACE
        - NET_ADMIN

  port: 9003

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9003
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9003
    initialDelaySeconds: 10
    periodSeconds: 5

  volumeMounts:
    - name: runtime-config
      mountPath: /etc/adam-agt/runtime
      readOnly: true
    - name: cgroup
      mountPath: /sys/fs/cgroup
      readOnly: false
    - name: proc
      mountPath: /host/proc
      readOnly: true

  env:
    - name: RING_MODE
      value: "three-ring"

    - name: ENFORCEMENT_MODE
      value: "block"

    - name: LOG_LEVEL
      value: "info"

# ============================================================================
# AGENT SRE PACKAGE (Site Reliability Engineering & Observability)
# ============================================================================

agentSre:
  image:
    repository: adam-registry.example.com/adam-agent-sre
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1002
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  metricsPort: 9090

  livenessProbe:
    httpGet:
      path: /metrics
      port: 9090
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /ready
      port: 9090
    initialDelaySeconds: 5
    periodSeconds: 5

  env:
    # Prometheus integration
    - name: PROMETHEUS_ENABLED
      value: "true"

    - name: PROMETHEUS_PUSHGATEWAY
      value: "prometheus-pushgateway.monitoring.svc.cluster.local:9091"

    - name: METRICS_INTERVAL_SECONDS
      value: "60"

    - name: LOG_LEVEL
      value: "info"

# ============================================================================
# AGENT COMPLIANCE PACKAGE (Regulatory Compliance & Audit Trails)
# ============================================================================

agentCompliance:
  image:
    repository: adam-registry.example.com/adam-agent-compliance
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1003
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  port: 9004

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9004
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9004
    initialDelaySeconds: 5
    periodSeconds: 5

  volumeMounts:
    - name: compliance-config
      mountPath: /etc/adam-agt/compliance
      readOnly: true

  env:
    - name: REGULATORY_FRAMEWORKS
      value: "EU_AI_ACT,DORA,NIS2,SOC2"

    # Flight Recorder configuration (external database)
    - name: FLIGHT_RECORDER_HOST
      value: "flight-recorder.example.com"

    - name: FLIGHT_RECORDER_PORT
      value: "5432"

    - name: FLIGHT_RECORDER_SUBMIT_INTERVAL_SECONDS
      value: "60"

    - name: AUDIT_LOG_LEVEL
      value: "info"

# ============================================================================
# AGENT MARKETPLACE PACKAGE (Plugin Signing & Artifact Verification)
# ============================================================================

agentMarketplace:
  image:
    repository: adam-registry.example.com/adam-agent-marketplace
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 75m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 192Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1004
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  port: 9005

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9005
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9005
    initialDelaySeconds: 5
    periodSeconds: 5

  env:
    - name: ARTIFACT_VERIFICATION_MODE
      value: "strict"

    - name: TRUSTED_PLUGIN_SOURCES
      value: "adam-core,approved-partners"

# ============================================================================
# AGENT LIGHTNING PACKAGE (Reinforcement Learning Governance)
# ============================================================================

agentLightning:
  image:
    repository: adam-registry.example.com/adam-agent-lightning
    tag: "1.1.0"
    pullPolicy: IfNotPresent

  enabled: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1005
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  port: 9006

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9006
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9006
    initialDelaySeconds: 10
    periodSeconds: 5

  volumeMounts:
    - name: lightning-models
      mountPath: /var/lib/adam-agt/lightning

    - name: tmp-volume
      mountPath: /tmp

  env:
    - name: RL_LEARNING_MODE
      value: "online"

    - name: MODEL_UPDATE_INTERVAL_SECONDS
      value: "300"

    - name: REWARD_FUNCTION
      value: "compliance_score"

# ============================================================================
# NODE AFFINITY AND TOPOLOGY CONSTRAINTS
# ============================================================================

nodeAffinity:
  preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist

  requiredDuringSchedulingIgnoredDuringExecution:
    nodeSelectorTerms:
      - matchExpressions:
          - key: kubernetes.io/os
            operator: In
            values:
              - linux

# ============================================================================
# SECURITY AND COMPLIANCE SETTINGS
# ============================================================================

security:
  podSecurityPolicy:
    enabled: true

  networkPolicy:
    enabled: true

  rbac:
    enabled: true

  podSecurityStandards:
    enforce: restricted
    audit: restricted
    warn: restricted

# ============================================================================
# HELM DEPENDENCIES
# ============================================================================
# These charts can be automatically installed via Helm dependencies

helmDependencies:
  # Prometheus Operator for metrics collection
  prometheus:
    enabled: true
    chart: prometheus-community/kube-prometheus-stack
    version: "50.0.0"

  # HashiCorp Vault for secret management
  vault:
    enabled: true
    chart: hashicorp/vault
    version: "0.27.0"

  # PostgreSQL for policy database (if using in-cluster)
  postgresql:
    enabled: false  # Set to true to deploy in-cluster
    chart: bitnami/postgresql
    version: "12.0.0"
