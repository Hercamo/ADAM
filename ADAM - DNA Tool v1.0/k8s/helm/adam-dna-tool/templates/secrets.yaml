---
# Secret template - populate with actual values before deploying
# In production, use external secrets manager (AWS Secrets Manager, Azure Key Vault, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.secretRef }}
  labels:
    app.kubernetes.io/name: {{ include "adam-dna-tool.name" . }}
type: Opaque
stringData:
  # AI Provider API Keys - set at least one
  OPENAI_API_KEY: "REPLACE_WITH_YOUR_OPENAI_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_ANTHROPIC_KEY"
  # Azure OpenAI (optional)
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: ""
  # Application secret
  SECRET_KEY: "{{ randAlphaNum 64 }}"
