# =============================================================
# ADAM DNA Tool - Helm Chart Values
# Override these values for your environment
# =============================================================

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# Backend (FastAPI)
backend:
  replicaCount: 2
  image:
    repository: adam-dna-tool-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    AI_PROVIDER: "openai"
    LOG_LEVEL: "INFO"
    DEBUG: "false"
    MAX_UPLOAD_SIZE_MB: "100"
    SESSION_TTL_HOURS: "72"
  # Secrets - reference a K8s Secret for API keys
  secretRef: adam-dna-secrets
  # Volume for ADAM documentation
  adamDocsVolume:
    enabled: true
    mountPath: /app/adam-docs
  # Volume for DNA Deployment Tool
  dnaToolVolume:
    enabled: true
    mountPath: /app/dna-tool
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Frontend (Nginx + React)
frontend:
  replicaCount: 2
  image:
    repository: adam-dna-tool-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: adam-dna-backend
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: adam-dna.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
        - path: /ws
          pathType: Prefix
          service: backend
  tls:
    - secretName: adam-dna-tls
      hosts:
        - adam-dna.example.com

# Persistent storage for uploads and output
persistence:
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteMany
  output:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessMode: ReadWriteMany

# Network policies
networkPolicy:
  enabled: false

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}
