global:
  company: NetStreamX
  companySlug: netstreamx
  adamVersion: '1.4'
  platform: kubernetes-opensource
  imageRegistry: ghcr.io/adam-platform
  imageTag: 0.4.0
  dnaQuestionnaireVersion: '1.0'
  bossFormulasVersion: '3.2'
coreEngine:
  enabled: true
  database: janusgraph
  replicas: 3
  resources:
    requests:
      cpu: '16'
      memory: 64Gi
    limits:
      cpu: '32'
      memory: 128Gi
  persistence:
    enabled: true
    size: 500Gi
    storageClass: fast-ssd
bossScoring:
  enabled: true
  replicas: 3
  dimensions:
    security_impact: 5.0
    sovereignty_action: 4.0
    financial_exposure: 4.0
    regulatory_impact: 3.0
    reputational_risk: 3.0
    rights_certainty: 3.0
    doctrinal_alignment: 2.0
  thresholds:
    soap:
      min: 0
      max: 10
      label: SOAP - Safe & Optimum Autonomous Performance
    moderate:
      min: 11
      max: 30
      label: MODERATE - Constrained Execution
    elevated:
      min: 31
      max: 50
      label: ELEVATED - Exception Likely
    high:
      min: 51
      max: 75
      label: HIGH - Director Review Required
    ohshat:
      min: 76
      max: 100
      label: OHSHAT - Operational Hell, Send Humans Act Today!
  resources:
    requests:
      cpu: '8'
      memory: 32Gi
    limits:
      cpu: '16'
      memory: 64Gi
  priorityTiers:
    security_impact: Top
    sovereignty_action: Very High
    financial_exposure: Very High
    regulatory_impact: High
    reputational_risk: High
    rights_certainty: High
    doctrinal_alignment: Medium
  weightSum: 24.0
  compositeFormula: weighted_average
  nonIdempotentPenalty: 15
  nonIdempotentPenaltyType: additive_flat
  criticalDimensionOverrideThreshold: 75
flightRecorder:
  enabled: true
  storage: minio
  replicas: 3
  retention:
    years: 7
  immutable: true
  hashChain: true
policyEngine:
  enabled: true
  engine: opa-gatekeeper
  replicas: 3
agentMesh:
  domainGovernors:
    replicas: 3
    resources:
      requests:
        cpu: '8'
        memory: 32Gi
      limits:
        cpu: '16'
        memory: 64Gi
        nvidia.com/gpu: '1'
  orchestrationAgents:
    replicas: 3
    resources:
      requests:
        cpu: '8'
        memory: 32Gi
      limits:
        cpu: '16'
        memory: 64Gi
  humanInterface:
    replicas: 2
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
  corporateWorkGroups:
    replicas: 2
    resources:
      requests:
        cpu: '2'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 16Gi
  aiCentricDivision:
    replicas: 2
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
  digitalTwins:
    replicas: 2
    resources:
      requests:
        cpu: '16'
        memory: 64Gi
      limits:
        cpu: '32'
        memory: 128Gi
        nvidia.com/gpu: '4'
  metaGovernance:
    replicas: 2
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
llm:
  provider: ollama
  models:
    reasoning:
      name: llama3.1:70b
      replicas: 3
    execution:
      name: llama3.1:8b
      replicas: 5
    embedding:
      name: nomic-embed-text
      replicas: 2
  alternativeProviders:
    vllm:
      enabled: false
      model: meta-llama/Meta-Llama-3.1-70B-Instruct
    openai_compatible:
      enabled: false
      endpoint: https://api.example.com/v1
janusgraph:
  enabled: true
minio:
  enabled: true
  replicas: 4
  persistence:
    size: 1Ti
opa:
  enabled: true
grafana:
  enabled: true
prometheus:
  enabled: true
monitoring:
  opentelemetry:
    enabled: true
  dashboards:
    boss: true
    agents: true
    governance: true
    evidence: true
