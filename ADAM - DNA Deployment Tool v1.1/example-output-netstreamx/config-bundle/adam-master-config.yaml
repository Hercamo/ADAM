$schema: https://adam.io/schemas/dna-config/v1.1
adam_version: '1.4'
dna_questionnaire_version: '1.0'
boss_formulas_version: '3.2'
company:
  name: NetStreamX
  slug: netstreamx
  generated: '2026-04-20'
  mission: "To entertain the world \u2014 giving every person on earth access to the\
    \ stories, ideas, and experiences that move them."
  vision: "To become the world\u2019s leading entertainment platform where any human,\
    \ in any language, on any device, can find a story that changes their perspective."
core_engine:
  graph_type: gremlin-compatible
  vertex_types:
  - Doctrine
  - Culture
  - Objectives
  - Rules
  - Expectations
  - Financials
  - Rights
  - Customer
  - Regulatory
  - StrategyDrift
  - IntentObject
  edge_types:
  - GOVERNS
  - CONSTRAINS
  - PRIORITIZES
  - CONFLICTS_WITH
  - DELEGATES_TO
  - MONITORS
  - FEEDS_INTO
  - ESCALATES_TO
  - AUDITS
  - SIMULATES
  immutable_layer: doctrine-root
  version_controlled: true
boss:
  # ADAM BOSS v3.2 canonical 7-dimension set. Priority Tiers: Top=5.0 (Security), Very High=4.0 (Sovereignty, Financial),
  # High=3.0 (Regulatory, Reputational, Rights), Medium=2.0 (Doctrinal). Denominator Sigma = 24.0.
  dimensions:
    security_impact: 5.0
    sovereignty_action: 4.0
    financial_exposure: 4.0
    regulatory_impact: 3.0
    reputational_risk: 3.0
    rights_certainty: 3.0
    doctrinal_alignment: 2.0
  priority_tiers:
    security_impact: Top
    sovereignty_action: Very High
    financial_exposure: Very High
    regulatory_impact: High
    reputational_risk: High
    rights_certainty: High
    doctrinal_alignment: Medium
  weight_sum: 24.0
  thresholds:
    soap:
      min: 0
      max: 10
      label: SOAP - Safe & Optimum Autonomous Performance
    moderate:
      min: 11
      max: 30
      label: MODERATE - Constrained Execution
    elevated:
      min: 31
      max: 50
      label: ELEVATED - Exception Likely
    high:
      min: 51
      max: 75
      label: HIGH - Director Review Required
    ohshat:
      min: 76
      max: 100
      label: OHSHAT - Operational Hell, Send Humans Act Today!
  composite_formula: weighted_average
  composite_expression: "C = (S_sec*5.0 + S_sov*4.0 + S_fin*4.0 + S_reg*3.0 + S_rep*3.0 + S_rights*3.0 + S_doc*2.0) / 24.0"
  non_idempotent_penalty: 15
  non_idempotent_penalty_type: additive_flat
  critical_dimension_override_threshold: 75
  critical_dimension_override_rule: "if max(S_d) > 75: C = max(C, max(S_d) - 10)"
agent_mesh:
  total_agents: '81+'
  reference_count: 81
  total_vcpus: 3180
  total_ram_gb: 12720
  gpu_agents: 42
  classes:
    domain_governors: 5
    orchestration_agents: 4
    human_interface_agents: 3
    corporate_work_groups: 39
    ai_centric_division: 23
    digital_twin_agents: 4
    meta_governance_agents: 3
  layers:
  - Human Interface
  - Domain Governors
  - Orchestration
  - Agentic Work Groups
  - Digital Twins & Meta-Governance
  cross_cutting_planes:
  - Identity & Authorization
  - Observability & Flight Recorder
  - Policy & Doctrine
  - Data & Memory
  - Resilience & Continuity
  - Sovereignty & Regulatory
  - Evolution & Adaptation
governance:
  model: 5-director-constitution
  directors:
  - CEO
  - CFO
  - Legal Director
  - Market Director
  - CISO
  optional_directors:
  - CPO
  - CTO
  domain_governors:
  - Financial Governor Agent
  - Legal & Compliance Governor Agent
  - Security & Trust Governor Agent
  - Market & Ecosystem Governor Agent
  - Operations & Delivery Governor Agent
  interface_agents:
  - Intent Interpretation
  - Trust Gateway
  - Explain-Back
  exception_economy: true
sovereignty:
  tiers:
  - Sovereign Governance
  - Controlled Execution
  - Federated Integration
  seal_objectives:
    SOV-1: 15
    SOV-2: 10
    SOV-3: 10
    SOV-4: 15
    SOV-5: 20
    SOV-6: 15
    SOV-7: 10
    SOV-8: 5
platforms_supported:
- azure
- aws
- gcp
- kubernetes
- azure-local
