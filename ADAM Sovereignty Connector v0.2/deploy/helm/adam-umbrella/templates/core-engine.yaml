apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-engine
  namespace: adam-core
  labels:
    adam.component: core-engine
    {{- include "adam.labels" $ | nindent 4 }}
spec:
  replicas: {{ .Values.coreEngine.replicas }}
  selector: { matchLabels: { adam.component: core-engine } }
  template:
    metadata:
      labels: { adam.component: core-engine }
    spec:
      containers:
        - name: core-engine
          image: {{ .Values.coreEngine.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 3 }
          resources:
            {{- toYaml .Values.coreEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata: { name: core-engine, namespace: adam-core }
spec:
  selector: { adam.component: core-engine }
  ports: [{ port: 8080, targetPort: 8080 }]
