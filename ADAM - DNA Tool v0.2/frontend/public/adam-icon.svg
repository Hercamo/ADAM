<?xml version="1.0" encoding="UTF-8"?>
<!-- ADAM DNA Tool favicon — double-helix mark over the ADAM wordmark.
     Minimal SVG so it inlines well at 16×16 and still reads at 48×48. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ADAM DNA">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <!-- Double-helix strands -->
  <path d="M18 10 C 34 22, 30 42, 46 54" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M46 10 C 30 22, 34 42, 18 54" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Rungs -->
  <line x1="22" y1="18" x2="42" y2="18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="28" x2="38" y2="28" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="38" x2="38" y2="38" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="48" x2="42" y2="48" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
