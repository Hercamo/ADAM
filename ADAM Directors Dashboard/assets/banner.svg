<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-label="ADAM Directors Dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0f1a"/>
      <stop offset="50%" stop-color="#121a2b"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#5aa2ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5aa2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#7cf2d1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7cf2d1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5aa2ff"/>
      <stop offset="100%" stop-color="#2c5fb3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#glow)"/>
  <rect width="1200" height="260" fill="url(#glow2)"/>

  <!-- mesh dots: 81 agents rendered as a grid, colour coded -->
  <g transform="translate(800, 40)">
    <g fill="#2ecc71">
      <!-- 12 rows x 7 cols -->
      <circle cx="0"   cy="0"   r="5"/><circle cx="20"  cy="0"   r="5"/><circle cx="40"  cy="0"   r="5"/><circle cx="60"  cy="0"   r="5"/><circle cx="80"  cy="0"   r="5"/><circle cx="100" cy="0"   r="5"/><circle cx="120" cy="0"   r="5"/>
      <circle cx="0"   cy="20"  r="5"/><circle cx="20"  cy="20"  r="5"/><circle cx="40"  cy="20"  r="5"/><circle cx="60"  cy="20"  r="5"/><circle cx="80"  cy="20"  r="5"/><circle cx="100" cy="20"  r="5"/><circle cx="120" cy="20"  r="5"/>
      <circle cx="0"   cy="40"  r="5"/><circle cx="20"  cy="40"  r="5"/><circle cx="40"  cy="40"  r="5"/><circle cx="60"  cy="40"  r="5"/><circle cx="80"  cy="40"  r="5"/><circle cx="100" cy="40"  r="5"/><circle cx="120" cy="40"  r="5"/>
      <circle cx="0"   cy="60"  r="5"/><circle cx="20"  cy="60"  r="5"/><circle cx="40"  cy="60"  r="5"/><circle cx="60"  cy="60"  r="5"/><circle cx="80"  cy="60"  r="5"/><circle cx="100" cy="60"  r="5"/><circle cx="120" cy="60"  r="5"/>
      <circle cx="0"   cy="80"  r="5"/><circle cx="20"  cy="80"  r="5"/><circle cx="40"  cy="80"  r="5"/><circle cx="60"  cy="80"  r="5"/><circle cx="80"  cy="80"  r="5"/><circle cx="100" cy="80"  r="5"/><circle cx="120" cy="80"  r="5"/>
      <circle cx="0"   cy="100" r="5"/><circle cx="20"  cy="100" r="5"/><circle cx="40"  cy="100" r="5"/><circle cx="60"  cy="100" r="5"/><circle cx="80"  cy="100" r="5"/><circle cx="100" cy="100" r="5"/><circle cx="120" cy="100" r="5"/>
      <circle cx="0"   cy="120" r="5"/><circle cx="20"  cy="120" r="5"/><circle cx="40"  cy="120" r="5"/><circle cx="60"  cy="120" r="5"/><circle cx="80"  cy="120" r="5"/><circle cx="100" cy="120" r="5"/><circle cx="120" cy="120" r="5"/>
      <circle cx="0"   cy="140" r="5"/><circle cx="20"  cy="140" r="5"/><circle cx="40"  cy="140" r="5"/><circle cx="60"  cy="140" r="5"/><circle cx="80"  cy="140" r="5"/><circle cx="100" cy="140" r="5"/><circle cx="120" cy="140" r="5"/>
      <circle cx="0"   cy="160" r="5"/><circle cx="20"  cy="160" r="5"/><circle cx="40"  cy="160" r="5"/><circle cx="60"  cy="160" r="5"/><circle cx="80"  cy="160" r="5"/><circle cx="100" cy="160" r="5"/><circle cx="120" cy="160" r="5"/>
      <circle cx="0"   cy="180" r="5"/><circle cx="20"  cy="180" r="5"/><circle cx="40"  cy="180" r="5"/><circle cx="60"  cy="180" r="5"/><circle cx="80"  cy="180" r="5"/><circle cx="100" cy="180" r="5"/><circle cx="120" cy="180" r="5"/>
      <circle cx="0"   cy="200" r="5"/><circle cx="20"  cy="200" r="5"/><circle cx="40"  cy="200" r="5"/><circle cx="60"  cy="200" r="5"/><circle cx="80"  cy="200" r="5"/><circle cx="100" cy="200" r="5"/><circle cx="120" cy="200" r="5"/>
    </g>
    <g>
      <circle cx="60"  cy="40"  r="6" fill="#ff8c42"/>
      <circle cx="100" cy="80"  r="6" fill="#ff8c42"/>
      <circle cx="20"  cy="120" r="6" fill="#ef4444"/>
      <circle cx="80"  cy="160" r="6" fill="#ff8c42"/>
    </g>
  </g>

  <!-- Brand mark -->
  <g transform="translate(60, 70)">
    <rect width="60" height="60" rx="14" fill="url(#mark)"/>
    <text x="30" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#fff">AD</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(145, 90)" font-family="Inter, system-ui, sans-serif" fill="#e5ecf7">
    <text y="0" font-size="38" font-weight="700" letter-spacing="0.5">ADAM Directors Dashboard</text>
    <text y="34" font-size="14" font-weight="500" fill="#9aa7c2" letter-spacing="3" text-transform="uppercase">AUTONOMOUS DECISIONING · ADJUDICATION MESH</text>
    <text y="72" font-size="13" fill="#6a7693">Real-time control surface for the 5 Directors governing the 81-agent mesh.</text>
  </g>

  <!-- tier-pills strip -->
  <g transform="translate(60, 200)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="1.5">
    <g>
      <rect x="0"   y="0" rx="10" ry="10" width="68" height="22" fill="#1e3a2a"/>
      <text x="34"  y="15" text-anchor="middle" fill="#2ecc71">SOAP</text>
    </g>
    <g>
      <rect x="76"  y="0" rx="10" ry="10" width="90" height="22" fill="#2a3a20"/>
      <text x="121" y="15" text-anchor="middle" fill="#a8e061">MODERATE</text>
    </g>
    <g>
      <rect x="174" y="0" rx="10" ry="10" width="92" height="22" fill="#3a2e14"/>
      <text x="220" y="15" text-anchor="middle" fill="#f5b042">ELEVATED</text>
    </g>
    <g>
      <rect x="274" y="0" rx="10" ry="10" width="68" height="22" fill="#3a2011"/>
      <text x="308" y="15" text-anchor="middle" fill="#ff8c42">HIGH</text>
    </g>
    <g>
      <rect x="350" y="0" rx="10" ry="10" width="84" height="22" fill="#3a1212"/>
      <text x="392" y="15" text-anchor="middle" fill="#ef4444">OHSHAT</text>
    </g>
  </g>
</svg>
