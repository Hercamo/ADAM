# ══════════════════════════════════════════════════════════════════════════════
# AGT Agent Runtime: Execution Ring Assignments
# Maps ADAM's 81-Agent Mesh classes to AGT execution rings (0-3)
# ══════════════════════════════════════════════════════════════════════════════
# Ring model: CPU-privilege-inspired containment (AGT Agent Runtime)
# Ring 0 = highest privilege (doctrine write); Ring 3 = lowest (task execution)
# Reference: ADAM AGT Light Integration Plugin, Part 4.2 (Execution Rings)
# ══════════════════════════════════════════════════════════════════════════════

ring_definitions:
  ring_0:
    label: "Doctrine Layer"
    adam_authority_level: "Constitutional"
    boss_escalation_required: "OHSHAT (76-100)"
    allowed_capabilities:
      - doctrine_write
      - policy_publish
      - core_engine_admin
      - doctrine_version_increment
      - agent_suspension_authority
    description: >
      Highest privilege. Can write to the CORE Engine doctrine graph and
      publish new policies. OHSHAT-tier Director action required to invoke
      Ring 0 capabilities programmatically.

  ring_1:
    label: "Governor Layer"
    adam_authority_level: "Domain Governance"
    boss_escalation_required: "ELEVATED (31-50) and above"
    allowed_capabilities:
      - exception_adjudicate
      - intent_evaluate
      - domain_governance
      - escalation_authority
      - cross_domain_delegation_approval
      - agent_performance_review
    description: >
      Domain Governor Agents operate at Ring 1. Full domain governance
      authority within their domain. Cross-domain actions require both
      Governor Agents to agree. Escalation to Directors at HIGH tier.

  ring_2:
    label: "Coordination Layer"
    adam_authority_level: "Orchestration Authority"
    boss_escalation_required: "MODERATE (11-30) and above"
    allowed_capabilities:
      - task_orchestrate
      - tool_invoke_authorised
      - read_doctrine
      - intent_handoff
      - resource_allocation
    description: >
      Orchestration Agents, Human Interface Agents, and Digital Twin Agents.
      Can invoke tools within their authorized list and orchestrate work
      group agents. Cannot write to doctrine or adjudicate exceptions.

  ring_3:
    label: "Execution Layer"
    adam_authority_level: "Task Execution"
    boss_escalation_required: "SOAP (0-10) — MODERATE triggers review"
    allowed_capabilities:
      - tool_invoke_authorised_only
      - read_doctrine_readonly
      - evidence_write
    description: >
      Work Group Agents. Execution of assigned tasks only. Cannot invoke
      tools outside their tools_authorized list. Read-only access to
      doctrine. Cannot self-escalate ring level.

# ── AGENT CLASS RING ASSIGNMENTS ──────────────────────────────────────────────
agent_class_ring_assignments:
  meta_governance:
    ring: 0
    examples:
      - "Self-Audit Agent"
      - "Doctrine Versioning Agent"
      - "Schema Registry Agent"

  governor_agent:
    ring: 1
    examples:
      - "Financial Governor Agent"
      - "Legal & Compliance Governor Agent"
      - "Security & Trust Governor Agent"
      - "Market & Ecosystem Governor Agent"
      - "Operations & Delivery Governor Agent"

  orchestration:
    ring: 2
    examples:
      - "Enterprise Orchestration Agent"
      - "Resource & Capacity Orchestration Agent"
      - "Cross-Domain Orchestration Agent"
      - "Temporal Orchestration Agent"

  human_interface:
    ring: 2
    examples:
      - "Intent-to-Action Agent"
      - "Director Interface Agent"
      - "Stakeholder Reporting Agent"

  digital_twin:
    ring: 2
    examples:
      - "Operational Twin Agent"
      - "Risk & Compliance Twin Agent"
      - "Economic Twin Agent"
      - "AI Creativity Twin"

  work_group:
    ring: 3
    note: >
      All 63 work group agents operate at Ring 3 regardless of domain.
      Domain-specific authority is granted through tools_authorized list
      in the CORE Graph Agent vertex, not through ring elevation.

# ── RING CROSSING RULES ──────────────────────────────────────────────────────
ring_crossing_rules:
  upward_escalation:
    description: "Lower-ring agents may escalate to higher-ring agents via Intent Objects"
    mechanism: "A2A escalation_request message with authorization proof"
    allowed: true
    requires_boss_gate: true

  downward_delegation:
    description: "Higher-ring agents may delegate to lower-ring agents"
    mechanism: "Governor Agent approval grant with scope constraints"
    allowed: true
    requires_trust_score_check: true  # [AGT Light] Agent Mesh IATP validates trust before delegation

  cross_ring_direct_invocation:
    description: "Direct invocation across ring boundaries without escalation/delegation"
    allowed: false
    enforcement: "AGT Agent Runtime admission controller + OPA policy deny rule"
    violation_boss_adjustment: +20
    violation_boss_dimension: security_impact
